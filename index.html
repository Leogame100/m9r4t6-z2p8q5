<meta name="robots" content="noindex,nofollow,noarchive">
<style>
  :root{
    --bg:#0a0b10; --bg2:#111420; --panel:#161a28; --line:#26304a;
    --ink:#eef2ff; --muted:#8b93b0;
    --cyan:#4fe3d1; --cyan-dim:#2aa79a; --mag:#ff5c8a;
    --clay-a:#e0913c; --clay-b:#c8503c;
    --b1:#3b6fd4; --b2:#d8433a; --b3:#e6c02e; --b4:#2f9e44;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #1a2035, #0a0b10 62%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    overflow-x:hidden;
  }
  .mono{font-family:ui-monospace,"Courier New",Menlo,Consolas,monospace;}
  /* 扫描线 + 暗角，营造街机 CRT 感 */
  #scan{position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0 1px,transparent 1px 3px);
    mix-blend-mode:multiply;}
  #vign{position:fixed;inset:0;pointer-events:none;z-index:49;
    box-shadow:inset 0 0 160px 40px rgba(0,0,0,.65);}

  #hub{min-height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:26px;padding:40px 18px 60px;}
  .marquee{text-align:center;}
  .kicker{font-family:ui-monospace,monospace;letter-spacing:.5em;font-size:12px;
    color:var(--cyan);text-transform:uppercase;margin-bottom:12px;padding-left:.5em;}
  .title{font-family:ui-monospace,"Courier New",monospace;font-weight:800;
    text-transform:uppercase;letter-spacing:.10em;line-height:1;
    font-size:clamp(30px,7vw,62px);margin:0;color:#fff;
    text-shadow:0 3px 0 #000, 3px 0 0 var(--clay-b), -3px 0 0 var(--b1),
      0 0 22px rgba(79,227,209,.45);}
  .sub{margin-top:14px;color:var(--muted);font-size:14px;}
  .sub b{color:var(--ink);}

  .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;
    width:100%;max-width:880px;}
  @media (max-width:720px){ .cards{grid-template-columns:1fr;} }

  .cab{position:relative;background:linear-gradient(180deg,var(--panel),#0e1120);
    border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;
    display:flex;flex-direction:column;gap:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    transition:transform .12s ease, border-color .12s, box-shadow .12s;}
  .cab:hover,.cab:focus-visible{transform:translateY(-4px);border-color:var(--cyan-dim);
    box-shadow:0 16px 40px rgba(0,0,0,.6), 0 0 0 1px var(--cyan-dim), 0 0 30px rgba(79,227,209,.25);
    outline:none;}
  .screen{aspect-ratio:16/10;border-radius:10px;overflow:hidden;position:relative;
    background:#05060a;border:2px solid #000;box-shadow:inset 0 0 40px rgba(0,0,0,.8);}
  .screen .glow{position:absolute;inset:0;background:
    repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 3px);pointer-events:none;}

  /* 预览：橡皮泥战争（一排彩色泥团） */
  .clay-prev{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;
    gap:7px;padding:14px 10px;background:radial-gradient(400px 200px at 50% 0%,#2a2540,#151125);}
  .blob{width:12%;padding-bottom:12%;border-radius:42% 42% 46% 46%/48%;
    box-shadow:inset 0 -5px 8px rgba(0,0,0,.3), inset 0 4px 6px rgba(255,255,255,.35);}
  /* 预览：方砖破坏者（四排砖 + 球 + 挡板） */
  .brick-prev{position:absolute;inset:0;padding:12px 12px 6px;
    background:radial-gradient(400px 200px at 50% 0%,#12161f,#0a0c12);display:flex;flex-direction:column;gap:5px;}
  .brow{display:flex;gap:4px;}
  .brk{flex:1;height:9px;border-radius:2px;box-shadow:inset 0 2px 0 rgba(255,255,255,.25),inset 0 -2px 0 rgba(0,0,0,.3);}
  .ball{position:absolute;left:50%;bottom:26px;width:8px;height:8px;border-radius:50%;background:#fff;transform:translateX(-50%);
    box-shadow:0 0 8px rgba(255,255,255,.6);}
  .pad{position:absolute;left:50%;bottom:12px;width:34%;height:7px;border-radius:3px;background:#eef0f8;transform:translateX(-50%);}

  .cabmeta{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .cabname{font-weight:800;font-size:17px;letter-spacing:.02em;}
  .cabtag{color:var(--muted);font-size:12px;margin-top:2px;}
  .badge{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;
    padding:4px 8px;border-radius:6px;border:1px solid var(--line);color:var(--muted);white-space:nowrap;}
  .play{font-family:ui-monospace,monospace;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
    border:none;border-radius:10px;padding:11px;font-size:14px;cursor:pointer;color:#04141a;
    background:linear-gradient(180deg,var(--cyan),var(--cyan-dim));box-shadow:0 4px 0 #1c7a70;}
  .cab:active .play{transform:translateY(2px);box-shadow:0 2px 0 #1c7a70;}

  .foot{color:var(--muted);font-size:12px;text-align:center;max-width:620px;line-height:1.7;}
  .foot code{color:var(--cyan);background:#0e1524;padding:1px 6px;border-radius:5px;}

  /* 游戏播放层 */
  #player{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;}
  #player[hidden]{display:none;}
  .pbar{height:46px;flex:0 0 46px;display:flex;align-items:center;gap:12px;padding:0 12px;
    background:linear-gradient(180deg,#161a28,#0d1018);border-bottom:1px solid var(--line);}
  .back{font-family:ui-monospace,monospace;font-weight:800;letter-spacing:.08em;cursor:pointer;
    background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:13px;}
  .back:hover{border-color:var(--cyan-dim);color:var(--cyan);}
  .pname{font-family:ui-monospace,monospace;font-weight:800;letter-spacing:.06em;color:var(--cyan);}
  #frame{flex:1;width:100%;border:0;background:#000;}
  @media (prefers-reduced-motion:reduce){ .cab{transition:none;} }
</style>

<div id="scan"></div>
<div id="vign"></div>

<div id="hub">
  <div class="marquee">
    <div class="kicker">Insert Coin · 街机厅</div>
    <h1 class="title">Leo game1—100</h1>
    <div class="sub">两款自制像素游戏 · 点一款开始玩 · <b>手机 / 电脑</b>都能玩</div>
  </div>

  <div class="cards">
    <div class="cab" tabindex="0" role="button" aria-label="玩 橡皮泥：战争塑形前线" data-game="clay">
      <div class="screen">
        <div class="clay-prev" id="clayPrev"></div>
        <div class="glow"></div>
      </div>
      <div class="cabmeta">
        <div>
          <div class="cabname">橡皮泥：战争塑形前线</div>
          <div class="cabtag">15 色橡皮泥 · 塔防军团 · 天赋 & 科技树</div>
        </div>
        <div class="badge">策略 / 塔防</div>
      </div>
      <button class="play">▶ 开始游戏</button>
    </div>

    <div class="cab" tabindex="0" role="button" aria-label="玩 方砖破坏者" data-game="brick">
      <div class="screen">
        <div class="brick-prev" id="brickPrev">
          <div class="ball"></div><div class="pad"></div>
        </div>
        <div class="glow"></div>
      </div>
      <div class="cabmeta">
        <div>
          <div class="cabname">方砖破坏者</div>
          <div class="cabtag">像素打砖块 · Boss「机敏」· 天赋 / 商店 / 排行榜</div>
        </div>
        <div class="badge">街机 / 弹球</div>
      </div>
      <button class="play">▶ 开始游戏</button>
    </div>
  </div>

  <div class="foot">
    进度存档保存在你自己的浏览器里。若在此合集页无法存档（沙盒限制），游戏依然可正常游玩。
    分享这个网址，朋友打开即可玩。
  </div>
</div>

<div id="player" hidden>
  <div class="pbar">
    <button class="back" id="backBtn">◀ 返回选择</button>
    <span class="pname mono" id="pname"></span>
  </div>
  <iframe id="frame" title="游戏" allow="autoplay; fullscreen"></iframe>
</div>

<script>
const GAMES = {
  clay:  { name:"橡皮泥：战争塑形前线", html: "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>橡皮泥：战争塑形前线</title>\n<style>\n  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }\n  :root{\n    --bg:#2a2438; --panel:#37304a; --panel2:#443b5c; --ink:#f4eefe; --muted:#b8aecd;\n    --gold:#ffcf4a; --danger:#ff5c72; --good:#66e2a0;\n  }\n  html,body{ height:100%; background:radial-gradient(1200px 800px at 50% -10%,#3b3350,#211c2e 70%); color:var(--ink);\n    font-family:\"PingFang SC\",\"Microsoft YaHei\",-apple-system,system-ui,sans-serif; overflow:hidden; }\n  #app{ height:100%; display:flex; flex-direction:column; align-items:center; gap:8px; padding:8px; }\n  #topbar{ width:100%; max-width:1000px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;\n    background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid #554a72;\n    border-radius:14px; padding:8px 12px; box-shadow:0 6px 20px rgba(0,0,0,.35); }\n  #topbar .title{ font-weight:800; font-size:16px; letter-spacing:.5px; }\n  #topbar .title small{ color:var(--muted); font-weight:600; }\n  .stat{ display:flex; align-items:center; gap:6px; background:#2c2740; border:1px solid #4b4168;\n    padding:5px 10px; border-radius:10px; font-weight:700; font-size:14px; }\n  .stat .lab{ color:var(--muted); font-weight:600; font-size:12px; }\n  .spacer{ flex:1; }\n  .btn{ cursor:pointer; border:none; border-radius:10px; padding:7px 14px; font-weight:800; font-size:13px;\n    background:var(--gold); color:#3a2c00; box-shadow:0 3px 0 #b58a12; transition:transform .05s; }\n  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #b58a12; }\n  .btn.ghost{ background:#4b4168; color:var(--ink); box-shadow:0 3px 0 #2e2743; }\n  #stage{ position:relative; width:100%; max-width:1000px; aspect-ratio:5/3; }\n  canvas{ width:100%; height:100%; display:block; border-radius:16px; border:1px solid #554a72;\n    box-shadow:0 10px 30px rgba(0,0,0,.45); background:#1c1830; touch-action:none; }\n  #shop{ width:100%; max-width:1000px; display:flex; gap:7px; overflow-x:auto; padding:6px 4px 10px;\n    scrollbar-width:thin; }\n  #shop::-webkit-scrollbar{ height:7px; } #shop::-webkit-scrollbar-thumb{ background:#5a4f78; border-radius:8px; }\n  .card{ flex:0 0 auto; width:92px; background:var(--panel); border:2px solid #4b4168; border-radius:12px;\n    padding:6px 5px; cursor:pointer; position:relative; user-select:none; transition:border-color .1s, transform .05s; }\n  .card:active{ transform:scale(.97); }\n  .card.sel{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(255,207,74,.35); }\n  .card.dis{ opacity:.5; }\n  .card .cico{ width:100%; height:44px; border-radius:9px; display:flex; align-items:center; justify-content:center;\n    font-size:26px; box-shadow:inset 0 -6px 10px rgba(0,0,0,.25), inset 0 4px 8px rgba(255,255,255,.25); }\n  .card .cname{ font-size:11px; font-weight:800; text-align:center; margin-top:4px; white-space:nowrap;\n    overflow:hidden; text-overflow:ellipsis; }\n  .card .ccost{ display:flex; align-items:center; justify-content:center; gap:3px; font-size:12px; font-weight:900;\n    color:var(--gold); margin-top:2px; }\n  .card .stars{ font-size:8px; text-align:center; color:#ffd76a; line-height:1; height:9px; overflow:hidden; }\n  .card .cool{ position:absolute; inset:0; background:rgba(20,15,35,.7); border-radius:10px;\n    display:flex; align-items:flex-end; justify-content:center; font-weight:900; font-size:15px; color:#fff;\n    pointer-events:none; overflow:hidden; }\n  .card .coolfill{ position:absolute; left:0; bottom:0; width:100%; background:rgba(255,255,255,.12); }\n  .overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;\n    background:rgba(18,14,30,.86); border-radius:16px; text-align:center; padding:20px; z-index:5; }\n  .overlay h1{ font-size:26px; margin-bottom:6px; }\n  .overlay h1 .sub{ display:block; font-size:13px; color:var(--muted); font-weight:600; margin-top:4px; }\n  .overlay p{ color:var(--muted); font-size:13px; max-width:560px; line-height:1.6; margin:10px 0; }\n  .lore{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:600px; margin:8px 0 14px; }\n  .swatch{ display:flex; align-items:center; gap:5px; background:#2c2740; border:1px solid #4b4168;\n    padding:4px 8px; border-radius:20px; font-size:11px; }\n  .dot{ width:13px; height:13px; border-radius:50%; box-shadow:inset 0 -2px 3px rgba(0,0,0,.3); }\n  .hint{ position:absolute; top:8px; left:50%; transform:translateX(-50%); background:rgba(20,15,35,.8);\n    border:1px solid #554a72; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; z-index:4;\n    pointer-events:none; opacity:0; transition:opacity .3s; white-space:nowrap; }\n  .hint.show{ opacity:1; }\n  .tip{ position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--muted);\n    pointer-events:none; z-index:3; }\n  /* 天赋树 */\n  #talentScreen{ z-index:20; overflow:hidden; padding:14px; }\n  .tHead{ display:flex; align-items:center; gap:12px; margin-bottom:10px; flex-wrap:wrap; justify-content:center; }\n  .tHead h1{ font-size:22px; margin:0; }\n  .tPts{ background:#2c2740; border:1px solid #ffcf4a; color:var(--gold); font-weight:900;\n    padding:5px 12px; border-radius:20px; font-size:14px; }\n  .tTree{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; width:100%; max-width:820px;\n    overflow-y:auto; padding:4px; }\n  .tCol{ display:flex; flex-direction:column; align-items:center; gap:0; }\n  .tColH{ font-size:12px; font-weight:800; color:var(--muted); margin-bottom:6px; text-align:center; }\n  .tLink{ width:3px; height:12px; background:#4b4168; }\n  .tLink.on{ background:var(--gold); }\n  .tNode{ width:100%; max-width:180px; background:var(--panel); border:2px solid #4b4168; border-radius:11px;\n    padding:7px 8px; cursor:pointer; text-align:center; transition:transform .05s,border-color .1s; position:relative; }\n  .tNode:active{ transform:scale(.97); }\n  .tNode .tico{ font-size:20px; }\n  .tNode .tname{ font-size:12px; font-weight:800; margin:1px 0; }\n  .tNode .tdesc{ font-size:10px; color:var(--muted); line-height:1.35; }\n  .tNode .tcost{ font-size:10px; font-weight:900; color:var(--gold); margin-top:3px; }\n  .tNode.owned{ border-color:var(--good); background:#2c3d34; }\n  .tNode.owned .tcost{ color:var(--good); }\n  .tNode.avail{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(255,207,74,.25); }\n  .tNode.locked{ opacity:.5; }\n  .tFoot{ display:flex; gap:10px; margin-top:12px; }\n  /* 关卡选择 */\n  .lvGrid{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:760px; margin:6px 0 14px; }\n  .lvCard{ width:140px; background:var(--panel); border:2px solid #4b4168; border-radius:12px; padding:12px 10px;\n    cursor:pointer; text-align:center; transition:transform .05s,border-color .1s; }\n  .lvCard:active{ transform:scale(.97); }\n  .lvCard.done{ border-color:var(--good); }\n  .lvCard.open{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(255,207,74,.25); }\n  .lvCard.locked{ opacity:.45; cursor:not-allowed; }\n  .lvCard .lvno{ font-size:11px; color:var(--muted); font-weight:800; }\n  .lvCard .lvname{ font-size:15px; font-weight:900; margin:3px 0; }\n  .lvCard .lvmeta{ font-size:11px; color:var(--muted); line-height:1.4; }\n  .lvCard .lvbadge{ font-size:18px; margin-top:4px; height:20px; }\n</style>\n</head>\n<body>\n<div id=\"app\">\n  <div id=\"topbar\">\n    <div class=\"title\">🪄 橡皮泥：战争塑形前线 <small id=\"wavelab\">· 准备中</small></div>\n    <div class=\"spacer\"></div>\n    <div class=\"stat\">🟤<span class=\"lab\">泥料</span><span id=\"clay\">150</span></div>\n    <div class=\"stat\">❤️<span class=\"lab\">基地</span><span id=\"lives\">5</span></div>\n    <div class=\"stat\">💀<span class=\"lab\">击杀</span><span id=\"kills\">0</span></div>\n    <button class=\"btn ghost\" id=\"pauseBtn\">⏸ 暂停</button>\n  </div>\n\n  <div id=\"stage\">\n    <canvas id=\"cv\" width=\"1000\" height=\"600\"></canvas>\n    <div class=\"hint\" id=\"hint\"></div>\n    <div class=\"tip\">💎矿点上建🏭纸工厂/工程兵产量翻倍。🦇飞行敌人只能远程/🛩️防空拦截。双人：P2用方向键+逗号句号选兵+回车。</div>\n\n    <div class=\"overlay\" id=\"startScreen\">\n      <h1>橡皮泥：战争塑形前线<span class=\"sub\">Playdough War · Shaping Frontline</span></h1>\n      <p>黑泥感染正从右侧涌来。用不同颜色的橡皮泥捏出你的军团，守住左侧基地！<br>\n         每种颜色都有独特属性与技能——自由组合，打造你的塑形前线。</p>\n      <div class=\"lore\" id=\"loreBox\"></div>\n      <p id=\"startRecords\" style=\"margin:2px 0 10px;font-size:12px;\"></p>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;justify-content:center;\">\n        <button class=\"btn\" id=\"campaignBtn\" style=\"font-size:16px;padding:10px 24px;\">🗺️ 闯关模式</button>\n        <button class=\"btn\" id=\"endlessBtn\" style=\"font-size:16px;padding:10px 24px;background:#a45ce0;box-shadow:0 3px 0 #6f2fa8;color:#fff;\">🌀 无尽模式</button>\n        <button class=\"btn\" id=\"coopBtn\" style=\"font-size:16px;padding:10px 24px;background:#5fd0e0;box-shadow:0 3px 0 #3a9aa8;color:#08343a;\">👥 双人合作</button>\n        <button class=\"btn ghost\" id=\"talentBtn\" style=\"font-size:16px;padding:10px 24px;\">🌳 天赋树</button>\n        <button class=\"btn ghost\" id=\"techBtn\" style=\"font-size:16px;padding:10px 24px;\">🔬 科技树</button>\n      </div>\n    </div>\n  </div>\n\n  <div id=\"shop\"></div>\n</div>\n\n<script>\n\"use strict\";\n/* ============================ 数据：橡皮泥材料 & 单位 ============================ */\nconst CLAY = {\n  brown:{name:\"棕泥\", col:\"#8a5a3c\", star:1},\n  white:{name:\"白泥\", col:\"#f2f0ea\", star:1},\n  yellow:{name:\"黄泥\", col:\"#f2c94c\", star:2},\n  green:{name:\"绿泥\", col:\"#5fbf6a\", star:2},\n  blue:{name:\"蓝泥\", col:\"#4d7ee0\", star:3},\n  pink:{name:\"粉泥\", col:\"#f48fb1\", star:3},\n  purple:{name:\"紫泥\", col:\"#a45ce0\", star:4},\n  orange:{name:\"橙泥\", col:\"#f28c3c\", star:4},\n  red:{name:\"红泥\", col:\"#e0464b\", star:5},\n  gray:{name:\"灰泥\", col:\"#8b8fa0\", star:5},\n  cyan:{name:\"青泥\", col:\"#5fd0e0\", star:5},\n  silver:{name:\"银泥\", col:\"#cdd3e0\", star:6},\n  gold:{name:\"金泥\", col:\"#ffcf4a\", star:6},\n  black:{name:\"黑泥\", col:\"#2a2233\", star:7},\n  rainbow:{name:\"彩色泥\", col:\"#c86bd6\", star:8},\n};\n\n// 玩家可制作单位\nconst UNITS = [\n  {id:\"recruit\", clay:\"brown\", ico:\"🪖\", name:\"新兵\", cost:50, cd:3, hp:120, dmg:22, rate:0.9,\n   role:\"melee\", desc:\"最基础的近战肉盾\"},\n  {id:\"engineer\", clay:\"yellow\", ico:\"🔧\", name:\"工程兵\", cost:50, cd:6, hp:80, dmg:0, rate:0,\n   role:\"gen\", gen:25, genEvery:5, desc:\"每5秒产出泥料\"},\n  {id:\"medic\", clay:\"white\", ico:\"⛑️\", name:\"医疗兵\", cost:75, cd:7, hp:90, dmg:0, rate:0,\n   role:\"heal\", heal:28, healEvery:1.6, desc:\"治疗同行受伤单位\"},\n  {id:\"heavy\", clay:\"blue\", ico:\"🛡️\", name:\"重甲步兵\", cost:100, cd:8, hp:520, dmg:16, rate:1.2,\n   role:\"melee\", desc:\"高血量装甲前锋\"},\n  {id:\"fortress\", clay:\"gray\", ico:\"🧱\", name:\"移动堡垒\", cost:125, cd:12, hp:1100, dmg:0, rate:0,\n   role:\"wall\", desc:\"超硬城墙，专门挡路\"},\n  {id:\"commander\", clay:\"pink\", ico:\"📣\", name:\"指挥员\", cost:100, cd:10, hp:110, dmg:0, rate:0,\n   role:\"buff\", buff:0.4, desc:\"同行友军伤害+40%\"},\n  {id:\"poison\", clay:\"green\", ico:\"🧪\", name:\"毒气兵\", cost:125, cd:6, hp:90, dmg:8, rate:1.1,\n   role:\"shoot\", fx:\"poison\", desc:\"投毒，持续腐蚀\"},\n  {id:\"laser\", clay:\"purple\", ico:\"⚡\", name:\"激光炮\", cost:150, cd:6, hp:100, dmg:30, rate:1.0,\n   role:\"shoot\", fx:\"chain\", desc:\"电磁弹，链击2个敌人\"},\n  {id:\"flame\", clay:\"orange\", ico:\"🔥\", name:\"喷火坦克\", cost:150, cd:7, hp:160, dmg:26, rate:1.3,\n   role:\"shoot\", fx:\"splash\", desc:\"熔岩弹，范围灼烧\"},\n  {id:\"ice\", clay:\"cyan\", ico:\"❄️\", name:\"冰冻炮\", cost:125, cd:6, hp:100, dmg:14, rate:1.4,\n   role:\"shoot\", fx:\"slow\", desc:\"冰弹，冻缓敌人\"},\n  {id:\"berserker\", clay:\"red\", ico:\"⚔️\", name:\"狂战士\", cost:150, cd:8, hp:150, dmg:52, rate:0.55,\n   role:\"melee\", crit:0.25, desc:\"极高攻击，暴击连斩\"},\n  {id:\"rocket\", clay:\"red\", ico:\"🚀\", name:\"火箭炮\", cost:225, cd:16, hp:150, dmg:130, rate:3.6,\n   role:\"shoot\", fx:\"rocket\", desc:\"充能慢·火箭大范围爆炸\"},\n  {id:\"sniper\", clay:\"silver\", ico:\"🎯\", name:\"狙击兵\", cost:175, cd:9, hp:90, dmg:70, rate:1.6,\n   role:\"shoot\", fx:\"crit\", desc:\"超远精准，高暴击\"},\n  {id:\"guard\", clay:\"gold\", ico:\"👑\", name:\"皇家近卫\", cost:250, cd:16, hp:420, dmg:55, rate:0.7,\n   role:\"melee\", buff:0.2, desc:\"精英全能，自带光环\"},\n  // —— 纸工厂：可升级的产泥建筑 ——\n  {id:\"factory\", clay:\"white\", ico:\"🏭\", name:\"纸工厂\", cost:175, cd:14, role:\"factory\",\n   genEvery:5, lvls:[{hp:260,gen:34},{hp:440,gen:62},{hp:700,gen:104}], upCost:[200,300],\n   desc:\"产泥建筑·点击可升级(3级)·建在💎矿点产量翻倍\"},\n  // —— 科技解锁单位（默认锁定）——\n  {id:\"antiair\", clay:\"silver\", ico:\"🛩️\", name:\"防空炮\", cost:130, cd:9, hp:110, dmg:34, rate:1.1,\n   role:\"shoot\", fx:\"antiair\", locked:true, desc:\"对飞行敌人3倍伤害\"},\n  {id:\"beast\", clay:\"green\", ico:\"🐲\", name:\"生物战兽\", cost:200, cd:11, hp:640, dmg:40, rate:0.9,\n   role:\"melee\", fx:\"poison\", locked:true, desc:\"高血近战·撕咬带毒\"},\n  {id:\"spectrum\", clay:\"rainbow\", ico:\"🌈\", name:\"光谱士兵\", cost:300, cd:14, hp:260, dmg:60, rate:0.7,\n   role:\"shoot\", fx:\"chain\", locked:true, desc:\"终极·彩虹链光束\"},\n];\n\nconst ENEMIES = {\n  bug:  {name:\"感染兽\", ico:\"👾\", hp:80,  dmg:18, rate:1.0, speed:34, col:\"#3a3048\"},\n  crawler:{name:\"感染爬虫\", ico:\"🕷️\", hp:150, dmg:14, rate:0.8, speed:52, col:\"#2e2740\"},\n  wagon:{name:\"深渊战车\", ico:\"🚙\", hp:420, dmg:30, rate:1.1, speed:26, col:\"#241d33\"},\n  brute:{name:\"黑泥巨兽\", ico:\"👹\", hp:1600,dmg:60, rate:1.3, speed:20, col:\"#1c1628\"},\n  // —— 关卡专属 ——\n  flyer:{name:\"会飞的黑泥\", ico:\"🦇\", hp:95, dmg:22, rate:1.0, speed:64, col:\"#4a2f66\", fly:true},\n  splitter:{name:\"分裂感染兽\", ico:\"🫧\", hp:300, dmg:22, rate:1.0, speed:30, col:\"#243a2e\", split:true},\n  splitling:{name:\"感染孢子\", ico:\"🟢\", hp:70, dmg:12, rate:0.9, speed:48, col:\"#2e5540\", isSplit:true},\n};\n\n/* ============================ 天赋树（跨局永久成长） ============================ */\n// tier=层级(1顶→3底)，req=前置(满足任意一个即可解锁)，eff=对加成对象的修改\nconst TALENTS = [\n  // —— 经济线 · 棕黄 ——\n  {id:\"eco1\", branch:0, tier:1, ico:\"🟤\", name:\"泥料涌流\", cost:20, req:[],\n   eff:t=>t.trickleMult=1.6, desc:\"被动产泥 +60%\"},\n  {id:\"eco2\", branch:0, tier:2, ico:\"📦\", name:\"储备扩容\", cost:30, req:[\"eco1\"],\n   eff:t=>t.startClay+=120, desc:\"开局泥料 +120\"},\n  {id:\"eco3\", branch:0, tier:2, ico:\"🔧\", name:\"高效工程\", cost:35, req:[\"eco1\"],\n   eff:t=>t.genMult=1.6, desc:\"工程兵产量 +60%\"},\n  {id:\"eco4\", branch:0, tier:3, ico:\"♻️\", name:\"废料回收\", cost:60, req:[\"eco2\",\"eco3\"],\n   eff:t=>t.killClayMult=2.2, desc:\"击杀返还泥料 +120%\"},\n  // —— 攻击线 · 红银 ——\n  {id:\"atk1\", branch:1, tier:1, ico:\"⚔️\", name:\"利刃塑形\", cost:20, req:[],\n   eff:t=>t.dmgMult*=1.15, desc:\"全体伤害 +15%\"},\n  {id:\"atk2\", branch:1, tier:2, ico:\"🔥\", name:\"狂热\", cost:35, req:[\"atk1\"],\n   eff:t=>t.atkSpeedMult=0.8, desc:\"攻击速度 +25%\"},\n  {id:\"atk3\", branch:1, tier:2, ico:\"🎯\", name:\"精准塑造\", cost:35, req:[\"atk1\"],\n   eff:t=>t.critBonus=0.15, desc:\"全体暴击率 +15%\"},\n  {id:\"atk4\", branch:1, tier:3, ico:\"💥\", name:\"重火力\", cost:65, req:[\"atk2\",\"atk3\"],\n   eff:t=>t.dmgMult*=1.25, desc:\"全体伤害 额外 +25%\"},\n  // —— 防御线 · 蓝灰 ——\n  {id:\"def1\", branch:2, tier:1, ico:\"🛡️\", name:\"硬化装甲\", cost:20, req:[],\n   eff:t=>t.hpMult=1.25, desc:\"全体生命 +25%\"},\n  {id:\"def2\", branch:2, tier:2, ico:\"🏰\", name:\"城防加固\", cost:30, req:[\"def1\"],\n   eff:t=>t.livesBonus+=3, desc:\"基地生命 +3\"},\n  {id:\"def3\", branch:2, tier:2, ico:\"⚡\", name:\"速塑工艺\", cost:35, req:[\"def1\"],\n   eff:t=>t.cdMult=0.75, desc:\"单位冷却 -25%\"},\n  {id:\"def4\", branch:2, tier:3, ico:\"⛑️\", name:\"白泥强化\", cost:55, req:[\"def2\",\"def3\"],\n   eff:t=>t.healMult=1.7, desc:\"治疗量 +70%\"},\n  // —— 元素/黑科技线 · 紫橙青绿黑 ——\n  {id:\"ele1\", branch:3, tier:1, ico:\"🌈\", name:\"元素亲和\", cost:25, req:[],\n   eff:t=>t.fxMult=1.5, desc:\"毒/火/冰 效果 +50%\"},\n  {id:\"ele2\", branch:3, tier:2, ico:\"❄️\", name:\"深度冰封\", cost:35, req:[\"ele1\"],\n   eff:t=>t.freezeBonus=1.6, desc:\"冰冻/减速时长 +60%\"},\n  {id:\"ele3\", branch:3, tier:2, ico:\"⏳\", name:\"从容备战\", cost:30, req:[\"ele1\"],\n   eff:t=>t.waveGapMult=1.5, desc:\"波次间隔 +50%（更多准备）\"},\n  {id:\"ele4\", branch:3, tier:3, ico:\"👑\", name:\"黑泥馈赠\", cost:70, req:[\"ele2\",\"ele3\"],\n   eff:t=>t.freeGuard=true, desc:\"每局开局免费获得皇家近卫\"},\n];\nconst BRANCH_NAME = [\"经济·棕黄\",\"攻击·红银\",\"防御·蓝灰\",\"元素·黑科技\"];\n\n/* ============================ 科技树（升级士兵 / 解锁新兵） ============================ */\n// kind:\"boost\" 强化已有单位(mod)；kind:\"unlock\" 解锁新单位(unit)\nconst TECH = [\n  // 步兵强化线\n  {id:\"k_rec\", branch:0, tier:1, ico:\"🪖\", name:\"精锐新兵\", cost:25, req:[],\n   kind:\"boost\", mod:{recruit:{hpMult:1.6,dmgMult:1.4}}, desc:\"新兵 生命+60% 伤害+40%\"},\n  {id:\"k_ber\", branch:0, tier:2, ico:\"⚔️\", name:\"狂暴之血\", cost:40, req:[\"k_rec\"],\n   kind:\"boost\", mod:{berserker:{rateMult:0.75,critAdd:0.2}}, desc:\"狂战士 攻速+33% 暴击+20%\"},\n  {id:\"k_beast\", branch:0, tier:3, ico:\"🐲\", name:\"生物工程\", cost:70, req:[\"k_ber\"],\n   kind:\"unlock\", unit:\"beast\", desc:\"解锁 · 生物战兽（绿泥）\"},\n  // 载具火力线\n  {id:\"k_laser\", branch:1, tier:1, ico:\"⚡\", name:\"电磁过载\", cost:30, req:[],\n   kind:\"boost\", mod:{laser:{dmgMult:1.25,chainAdd:1}}, desc:\"激光炮 伤害+25% 链击+1\"},\n  {id:\"k_ice\", branch:1, tier:2, ico:\"❄️\", name:\"寒冰工艺\", cost:30, req:[\"k_laser\"],\n   kind:\"boost\", mod:{ice:{rateMult:0.7,dmgMult:1.3}}, desc:\"冰冻炮 攻速+43% 伤害+30%\"},\n  {id:\"k_rocket\", branch:1, tier:3, ico:\"🚀\", name:\"重炮升级\", cost:55, req:[\"k_ice\"],\n   kind:\"boost\", mod:{rocket:{dmgMult:1.5,rateMult:0.8}}, desc:\"火箭炮 伤害+50% 装填+20%\"},\n  // 尖端科技线\n  {id:\"k_anti\", branch:2, tier:1, ico:\"🛩️\", name:\"防空体系\", cost:40, req:[],\n   kind:\"unlock\", unit:\"antiair\", desc:\"解锁 · 防空炮（专打飞行）\"},\n  {id:\"k_spec\", branch:2, tier:2, ico:\"🌈\", name:\"光谱科技\", cost:90, req:[\"k_anti\"],\n   kind:\"unlock\", unit:\"spectrum\", desc:\"解锁 · 光谱士兵（终极）\"},\n  {id:\"k_all\", branch:2, tier:3, ico:\"🎖️\", name:\"全军现代化\", cost:80, req:[\"k_spec\"],\n   kind:\"boost\", mod:{\"*\":{hpMult:1.12,dmgMult:1.12}}, desc:\"全体单位 生命+12% 伤害+12%\"},\n];\nconst TECH_BRANCH = [\"步兵强化\",\"载具火力\",\"尖端科技\"];\n\n/* ---- 存档（localStorage，跨局累积） ---- */\nconst SAVE_KEY = \"clayWarSave_v1\";\nlet SAVE = loadSave();\nfunction loadSave(){\n  const def={points:0, unlocked:[], techUnlocked:[], campaignCleared:0, bestWave:0, bestKills:0};\n  try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s&&s.unlocked) return {...def,...s}; }catch(e){}\n  return def;\n}\nfunction persist(){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify(SAVE)); }catch(e){} }\nfunction isUnlocked(id){ return SAVE.unlocked.includes(id); }\nfunction isTech(id){ return SAVE.techUnlocked.includes(id); }\nfunction canUnlock(t){\n  if(isUnlocked(t.id)) return false;\n  if(SAVE.points<t.cost) return false;\n  return t.req.length===0 || t.req.some(r=>isUnlocked(r));\n}\nfunction canTech(t){\n  if(isTech(t.id)) return false;\n  if(SAVE.points<t.cost) return false;\n  return t.req.length===0 || t.req.some(r=>isTech(r));\n}\n\n/* ---- 科技汇总：解锁单位集合 + 单位强化表 UMOD ---- */\nlet UNLOCKED_UNITS = new Set();\nlet UMOD = {};\nfunction computeTech(){\n  UNLOCKED_UNITS = new Set(UNITS.filter(u=>!u.locked).map(u=>u.id));\n  UMOD = {};\n  const ensure=id=>UMOD[id]||(UMOD[id]={hpMult:1,dmgMult:1,rateMult:1,critAdd:0,chainAdd:0});\n  for(const t of TECH){ if(!isTech(t.id)) continue;\n    if(t.kind===\"unlock\") UNLOCKED_UNITS.add(t.unit);\n    else if(t.kind===\"boost\"){\n      for(const uid in t.mod){ const m=ensure(uid), src=t.mod[uid];\n        if(src.hpMult) m.hpMult*=src.hpMult;\n        if(src.dmgMult) m.dmgMult*=src.dmgMult;\n        if(src.rateMult) m.rateMult*=src.rateMult;\n        if(src.critAdd) m.critAdd+=src.critAdd;\n        if(src.chainAdd) m.chainAdd+=src.chainAdd;\n      }\n    }\n  }\n}\nfunction umodFor(id){\n  const base={hpMult:1,dmgMult:1,rateMult:1,critAdd:0,chainAdd:0};\n  for(const key of [\"*\",id]){ const m=UMOD[key]; if(!m) continue;\n    base.hpMult*=m.hpMult; base.dmgMult*=m.dmgMult; base.rateMult*=m.rateMult;\n    base.critAdd+=m.critAdd; base.chainAdd+=m.chainAdd; }\n  return base;\n}\n\n/* ---- 汇总所有已解锁天赋 → 加成对象 TAL ---- */\nlet TAL = defaultTAL();\nfunction defaultTAL(){\n  return { trickleMult:1, startClay:0, genMult:1, killClayMult:1,\n           dmgMult:1, atkSpeedMult:1, critBonus:0,\n           hpMult:1, livesBonus:0, cdMult:1, healMult:1,\n           fxMult:1, freezeBonus:1, waveGapMult:1, freeGuard:false };\n}\nfunction computeTAL(){\n  TAL = defaultTAL();\n  for(const t of TALENTS) if(isUnlocked(t.id)) t.eff(TAL);\n  computeTech();\n}\n\n/* ============================ 画布 & 网格 ============================ */\nconst cv = document.getElementById(\"cv\"), ctx = cv.getContext(\"2d\");\nconst W = cv.width, H = cv.height;\nconst COLS = 9, ROWS = 5;\nconst CW = W / COLS, CH = H / ROWS;\nconst cellCX = c => c*CW + CW/2;\nconst rowCY  = r => r*CH + CH/2;\n\n/* ============================ 游戏状态 ============================ */\nlet G;\n// 资源点：确定性生成 4 个矿点（避开最左两列/基地）\nfunction genNodes(seed){\n  const set=new Set(), usedCols=new Set(); let x=(seed*9301+49297)%233280 + 1;\n  const next=()=>{ x=(x*9301+49297)%233280; return x/233280; };\n  let guard=0;\n  while(set.size<4 && guard++<80){\n    const c=2+Math.floor(next()*6);   // 列 2..7\n    const r=Math.floor(next()*ROWS);  // 行 0..4\n    if(usedCols.has(c)) continue;      // 每列至多一个矿点，分散分布\n    usedCols.add(c); set.add(r+\",\"+c);\n  }\n  return set;\n}\nfunction newGame(mode, level, twoP){\n  const lv = (mode===\"campaign\") ? LEVELS[level] : null;\n  let diff = lv?lv.diff:1;\n  if(twoP) diff*=1.4; // 双人：敌人更强\n  const seed = (mode===\"campaign\"? level+1 : 7) + (twoP?100:0);\n  G = {\n    running:false, paused:false, over:false, won:false,\n    mode:mode||\"campaign\", level:level||0, twoP:!!twoP,\n    diff, totalWaves: lv?lv.waves:0, // endless: totalWaves=0 表示无限\n    clay:150+TAL.startClay + (twoP?100:0), lives:5+TAL.livesBonus + (twoP?3:0), kills:0,\n    units:[], enemies:[], shots:[], parts:[], shake:0,\n    grid:Array.from({length:ROWS},()=>Array(COLS).fill(null)),\n    nodes: genNodes(seed),\n    selected:null, cd:{}, hoverCell:null,\n    sel2:null, cd2:{}, cursor:{c:4,r:2},   // P2（键盘）\n    t:0, trickle:0,\n    wave:0, waveTimer:3, inWave:false, toSpawn:[], spawnTimer:0, waveClearWait:0,\n  };\n  UNITS.forEach(u=>{ G.cd[u.id]=0; G.cd2[u.id]=0; });\n}\nfunction isNode(r,c){ return G.nodes.has(r+\",\"+c); }\n\n/* ============================ 波次生成 ============================ */\nfunction buildWave(n){\n  const list=[];\n  const push=(type,count,gap)=>{ for(let i=0;i<Math.max(0,count);i++) list.push({type,delay:gap}); };\n  const cap=x=>Math.min(x,16); // 单波数量上限，避免无尽后期爆屏\n  push(\"bug\", cap(3+n), 1.4 - Math.min(0.9,n*0.05));\n  if(n>=2) push(\"crawler\", cap(1+Math.floor(n/2)), 1.1);\n  if(n>=3) push(\"wagon\", cap(Math.floor(n/3)), 2.0);\n  if(n%4===0) push(\"brute\", cap(Math.floor(n/4)), 3.5); // boss 每4波\n  // 关卡专属敌人：闯关按关卡配置，无尽从第4波起随机加入\n  let special = [];\n  if(G && G.mode===\"campaign\") special = LEVELS[G.level].special||[];\n  else if(G && G.mode===\"endless\" && n>=4) special = [\"splitter\",\"flyer\"];\n  if(special.includes(\"splitter\") && n>=2) push(\"splitter\", cap(1+Math.floor(n/3)), 2.4);\n  if(special.includes(\"flyer\") && n>=3)    push(\"flyer\", cap(1+Math.floor(n/3)), 1.6);\n  // 打乱一点顺序（确定性洗牌，避免用随机破坏存档重放）\n  for(let i=list.length-1;i>0;i--){ const j=(i*7+n*3)%(i+1); [list[i],list[j]]=[list[j],list[i]]; }\n  return list;\n}\n\n/* ============================ 关卡定义 ============================ */\nconst LEVELS = [\n  {name:\"新兵训练场\", waves:6,  diff:0.85, special:[],                 tip:\"熟悉塑形，守住6波\"},\n  {name:\"感染前哨\",   waves:8,  diff:1.05, special:[],                 tip:\"感染开始成群\"},\n  {name:\"深渊战线\",   waves:10, diff:1.25, special:[\"splitter\"],       tip:\"分裂感染兽来袭\"},\n  {name:\"黑泥要塞\",   waves:12, diff:1.5,  special:[\"flyer\"],          tip:\"会飞的黑泥突袭\"},\n  {name:\"最终塑形\",   waves:15, diff:1.8,  special:[\"splitter\",\"flyer\"],tip:\"决战·黑泥狂潮\"},\n];\n\n/* ============================ 放置 & 输入 ============================ */\nconst shopEl = document.getElementById(\"shop\");\nfunction buildShop(){\n  shopEl.innerHTML=\"\";\n  UNITS.filter(u=>UNLOCKED_UNITS.has(u.id)).forEach(u=>{\n    const c = CLAY[u.clay];\n    const el = document.createElement(\"div\");\n    el.className=\"card\"; el.dataset.id=u.id;\n    el.innerHTML =\n      `<div class=\"cico\" style=\"background:${c.col}\">${u.ico}</div>\n       <div class=\"stars\">${\"★\".repeat(c.star)}</div>\n       <div class=\"cname\">${u.name}</div>\n       <div class=\"ccost\">🟤 ${u.cost}</div>\n       <div class=\"cool\" style=\"display:none\"><div class=\"coolfill\"></div></div>`;\n    el.title = `${c.name}·${u.name}\\n${u.desc}`;\n    el.addEventListener(\"click\",()=>selectUnit(u.id));\n    shopEl.appendChild(el);\n  });\n}\nfunction selectUnit(id){\n  G.selected = (G.selected===id)?null:id;\n  refreshShop();\n}\nfunction refreshShop(){\n  [...shopEl.children].forEach(el=>{\n    const id=el.dataset.id, u=UNITS.find(x=>x.id===id);\n    el.classList.toggle(\"sel\", G.selected===id);\n    const afford = G.clay>=u.cost, ready = G.cd[id]<=0;\n    el.classList.toggle(\"dis\", !(afford&&ready));\n    const cool=el.querySelector(\".cool\"), fill=el.querySelector(\".coolfill\");\n    if(G.cd[id]>0){ cool.style.display=\"flex\"; fill.style.height=(G.cd[id]/u.cd*100)+\"%\"; }\n    else cool.style.display=\"none\";\n  });\n}\n\nfunction canvasPoint(e){\n  const r=cv.getBoundingClientRect();\n  const x=(e.clientX-r.left)/r.width*W, y=(e.clientY-r.top)/r.height*H;\n  return {x,y,col:Math.floor(x/CW), row:Math.floor(y/CH)};\n}\ncv.addEventListener(\"mousemove\",e=>{\n  const p=canvasPoint(e);\n  G.hoverCell = (p.col>=0&&p.col<COLS&&p.row>=0&&p.row<ROWS)?{c:p.col,r:p.row}:null;\n});\ncv.addEventListener(\"mouseleave\",()=>G.hoverCell=null);\ncv.addEventListener(\"click\",e=>{\n  if(!G.running||G.over) return;\n  const p=canvasPoint(e);\n  if(p.col<0||p.col>=COLS||p.row<0||p.row>=ROWS) return;\n  const occ=G.grid[p.row][p.col];\n  if(!G.selected && occ && occ.role===\"factory\"){ upgradeFactory(occ); return; } // 无选中→点工厂升级\n  placeAt(p.col,p.row,1);\n});\n// —— P2 键盘控制（双人合作）——\nfunction unlockedList(){ return UNITS.filter(u=>UNLOCKED_UNITS.has(u.id)); }\nfunction cycleSel2(dir){\n  const list=unlockedList(); if(!list.length) return;\n  let i=list.findIndex(u=>u.id===G.sel2);\n  i = (i<0) ? (dir>0?0:list.length-1) : (i+dir+list.length)%list.length;\n  G.sel2=list[i].id;\n  const u=list[i]; flash(`P2 选择：${u.ico} ${u.name}（${u.cost}泥）`);\n}\nwindow.addEventListener(\"keydown\",e=>{\n  if(!G||!G.twoP||!G.running||G.over||G.paused) return;\n  const k=e.key;\n  const handled=[\"ArrowUp\",\"ArrowDown\",\"ArrowLeft\",\"ArrowRight\",\"Enter\",\",\",\".\",\"/\",\" \"];\n  if(!handled.includes(k)) return;\n  e.preventDefault();\n  if(k===\"ArrowUp\")    G.cursor.r=Math.max(0,G.cursor.r-1);\n  else if(k===\"ArrowDown\")  G.cursor.r=Math.min(ROWS-1,G.cursor.r+1);\n  else if(k===\"ArrowLeft\")  G.cursor.c=Math.max(0,G.cursor.c-1);\n  else if(k===\"ArrowRight\") G.cursor.c=Math.min(COLS-1,G.cursor.c+1);\n  else if(k===\",\") cycleSel2(-1);\n  else if(k===\".\") cycleSel2(1);\n  else if(k===\"Enter\"||k===\"/\"||k===\" \") placeAt(G.cursor.c,G.cursor.r,2);\n});\n\nfunction placeAt(c,r,who){\n  who=who||1;\n  const sel = who===1 ? G.selected : G.sel2;\n  const cd  = who===1 ? G.cd : G.cd2;\n  const tag = who===2 ? \"P2 \" : \"\";\n  const occ=G.grid[r][c];\n  if(!sel){ if(occ&&occ.role===\"factory\") upgradeFactory(occ); else flash(tag+\"先选择一种橡皮泥单位\"); return; }\n  const u=UNITS.find(x=>x.id===sel);\n  if(occ){ if(occ.role===\"factory\"){ upgradeFactory(occ); } else flash(tag+\"这里已经有单位了\"); return; }\n  if(cd[u.id]>0){ flash(`${tag}${u.name}还在冷却`); return; }\n  if(G.clay<u.cost){ flash(tag+\"泥料不足！造工程兵/纸工厂产泥\"); return; }\n  G.clay-=u.cost; cd[u.id]=u.cd*TAL.cdMult;\n  const unit=makeUnit(u,c,r); unit.owner=who;\n  G.grid[r][c]=unit; G.units.push(unit);\n  spawnParts(unit.x,unit.y,CLAY[u.clay].col,10);\n  if(unit.onNode) flash(\"💎 建在矿点·产量翻倍！\");\n  refreshShop();\n}\nfunction upgradeFactory(f){\n  if(f.lvl>=2){ flash(\"纸工厂已满级 (Lv3)\"); return; }\n  const cost=f.upCost[f.lvl];\n  if(G.clay<cost){ flash(`升级需要 ${cost} 泥料`); return; }\n  G.clay-=cost; f.lvl++;\n  const spec=f.lvls[f.lvl];\n  const newMax=Math.round(spec.hp*TAL.hpMult);\n  f.hp += newMax-f.maxhp; f.maxhp=newMax;      // 升级同时补血\n  f.gen=spec.gen*TAL.genMult*(f.onNode?2:1);\n  spawnParts(f.x,f.y,\"#ffcf4a\",16); f.sink=8;\n  flash(`纸工厂升级至 Lv${f.lvl+1}！产量↑`);\n  refreshShop();\n}\n\nfunction makeUnit(u,c,r){\n  const m=umodFor(u.id);\n  const baseHp = (u.role===\"factory\") ? u.lvls[0].hp : u.hp;\n  const hp=Math.round(baseHp*TAL.hpMult*m.hpMult);\n  const gen0 = (u.role===\"factory\") ? u.lvls[0].gen : (u.gen||0);\n  const onNode = isNode(r,c) && (u.role===\"factory\"||u.role===\"gen\"); // 矿点产泥翻倍\n  return { ...u, x:cellCX(c), y:rowCY(r), col:c, row:r, maxhp:hp, hp:hp,\n    dmg:(u.dmg||0)*m.dmgMult, rate:(u.rate||0)*TAL.atkSpeedMult*m.rateMult,\n    gen:gen0*TAL.genMult*(onNode?2:1), heal:(u.heal||0)*TAL.healMult, onNode,\n    crit:(u.crit||0)+TAL.critBonus+m.critAdd, chainMax:2+m.chainAdd, lvl:0,\n    timer:Math.random()*0.3, genTimer:(u.genEvery||0), healTimer:(u.healEvery||0),\n    flashT:0, sink:6 };\n}\nlet hintT=0; const hintEl=document.getElementById(\"hint\");\nfunction flash(msg){ hintEl.textContent=msg; hintEl.classList.add(\"show\"); hintT=1.6; }\n\n/* ============================ 战斗辅助 ============================ */\nfunction nearestEnemyRight(row,x,maxDist){\n  let best=null,bd=1e9;\n  for(const e of G.enemies){\n    if(e.row!==row||e.dead) continue;\n    const d=e.x-x;\n    if(d<-CW*0.3) continue;\n    if(maxDist&&d>maxDist) continue;\n    if(d<bd){ bd=d; best=e; }\n  }\n  return best;\n}\nfunction frontEnemyContact(unit){ // 敌人贴脸\n  let best=null,bd=1e9;\n  for(const e of G.enemies){\n    if(e.row!==unit.row||e.dead) continue;\n    const d=e.x-unit.x;\n    if(d>=-CW*0.15 && d<CW*0.62 && d<bd){ bd=d; best=e; }\n  }\n  return best;\n}\nfunction rowBuff(row){\n  let b=0;\n  for(const u of G.units){ if(u.dead) continue; if(u.row===row&&(u.role===\"buff\"||u.buff)&&u.buff) b+=u.buff; }\n  return 1+b;\n}\nfunction damageEnemy(e,dmg){\n  if(e.dead) return;\n  e.hp-=dmg; e.flashT=0.12;\n  if(e.hp<=0){ e.dead=true; G.kills++; G.clay+=6*TAL.killClayMult; spawnParts(e.x,e.y,e.col,12);\n    if(e.split) splitEnemy(e); }\n}\nfunction splitEnemy(e){\n  const base=ENEMIES.splitling;\n  const scale=(1+(G.wave-1)*(G.mode===\"endless\"?0.16:0.12))*G.diff*0.6;\n  for(let i=0;i<2;i++){\n    G.enemies.push({ ...base, type:\"splitling\", row:e.row, x:e.x+(i?24:-24), y:rowCY(e.row),\n      maxhp:base.hp*scale, hp:base.hp*scale, dmg:base.dmg*G.diff,\n      timer:0.2, flashT:0, poison:0, slow:0, dead:false });\n  }\n  spawnParts(e.x,e.y,\"#5fbf6a\",14);\n}\n\n/* ============================ 主循环 ============================ */\nlet last=0;\nfunction loop(ts){\n  requestAnimationFrame(loop);\n  const dt=Math.min(0.05,(ts-last)/1000||0); last=ts;\n  if(G.running&&!G.paused&&!G.over) update(dt);\n  render();\n}\nfunction update(dt){\n  G.t+=dt;\n  if(hintT>0){ hintT-=dt; if(hintT<=0) hintEl.classList.remove(\"show\"); }\n\n  // 泥料被动涓流\n  G.trickle+=dt; if(G.trickle>=4){ G.trickle-=4; G.clay+=15*TAL.trickleMult; }\n  // 冷却\n  for(const id in G.cd){ if(G.cd[id]>0) G.cd[id]=Math.max(0,G.cd[id]-dt); }\n  if(G.twoP) for(const id in G.cd2){ if(G.cd2[id]>0) G.cd2[id]=Math.max(0,G.cd2[id]-dt); }\n\n  waveLogic(dt);\n\n  /* --- 单位 --- */\n  for(const u of G.units){\n    if(u.dead) continue;\n    if(u.sink>0) u.sink=Math.max(0,u.sink-dt*20);\n    if(u.flashT>0) u.flashT-=dt;\n    const buff=rowBuff(u.row);\n\n    if(u.role===\"gen\"||u.role===\"factory\"){\n      u.genTimer-=dt; if(u.genTimer<=0){ u.genTimer=u.genEvery; G.clay+=u.gen;\n        spawnParts(u.x,u.y-10, u.role===\"factory\"?\"#ffe08a\":\"#f2c94c\", u.role===\"factory\"?9:6); }\n    }\n    else if(u.role===\"heal\"){\n      u.healTimer-=dt; if(u.healTimer<=0){ u.healTimer=u.healEvery;\n        let tgt=null,worst=1;\n        for(const a of G.units){ if(a.dead||a===u) continue;\n          if(Math.abs(a.row-u.row)<=1){ const f=a.hp/a.maxhp; if(f<worst&&f<1){ worst=f; tgt=a; } } }\n        if(tgt){ tgt.hp=Math.min(tgt.maxhp,tgt.hp+u.heal); spawnParts(tgt.x,tgt.y,\"#b6ffce\",5); }\n      }\n    }\n    else if(u.role===\"melee\"){\n      const e=frontEnemyContact(u);\n      if(e){ u.timer-=dt; if(u.timer<=0){ u.timer=u.rate;\n        let d=u.dmg*buff*TAL.dmgMult; if(u.crit&&Math.random()<u.crit) d*=2.2;\n        damageEnemy(e,d); u.attackFx=0.12;\n        if(u.fx===\"poison\"){ e.poison=Math.max(e.poison||0,3*TAL.freezeBonus); e.poisonDps=14*TAL.fxMult; } } }\n    }\n    else if(u.role===\"shoot\"){\n      const e=nearestEnemyRight(u.row,u.x, u.fx===\"crit\"?W:W);\n      if(e){ u.timer-=dt; if(u.timer<=0){ u.timer=u.rate; fireShot(u,e,buff); u.attackFx=0.12; } }\n    }\n    if(u.attackFx>0) u.attackFx-=dt;\n  }\n\n  /* --- 子弹 --- */\n  for(const s of G.shots){\n    if(s.dead) continue;\n    s.x+=s.vx*dt;\n    if(s.x>W+40){ s.dead=true; continue; }\n    for(const e of G.enemies){\n      if(e.dead||e.row!==s.row) continue;\n      if(Math.abs(e.x-s.x)<CW*0.35){\n        let d=s.dmg;\n        if(s.fx===\"crit\"&&Math.random()<0.4) d*=2.5;\n        if(s.fx===\"antiair\"&&e.fly) d*=3;   // 防空炮对飞行3倍\n        damageEnemy(e,d);\n        applyFx(s,e);\n        s.dead=true; spawnParts(s.x,s.y,s.color,5);\n        break;\n      }\n    }\n  }\n\n  /* --- 敌人 --- */\n  for(const e of G.enemies){\n    if(e.dead) continue;\n    if(e.flashT>0) e.flashT-=dt;\n    // 状态：中毒/减速\n    if(e.poison>0){ e.poison-=dt; damageEnemy(e,e.poisonDps*dt); }\n    let sp=e.speed;\n    if(e.slow>0){ e.slow-=dt; sp*=0.45; }\n    // 飞行敌人无视地面阻挡，直接飘向基地（只能被远程/防空拦截）\n    const blocker = e.fly ? null : blockerFor(e);\n    if(blocker){\n      e.timer-=dt; if(e.timer<=0){ e.timer=e.rate; blocker.hp-=e.dmg; blocker.flashT=0.12;\n        spawnParts(blocker.x+10,blocker.y,\"#ff7a8a\",4);\n        if(blocker.hp<=0){ blocker.dead=true; G.grid[blocker.row][blocker.col]=null; } }\n    } else {\n      e.x-=sp*dt;\n    }\n    if(e.x < -CW*0.3){ e.dead=true; breach(); }\n  }\n\n  // 清理\n  G.units=G.units.filter(u=>!u.dead);\n  G.enemies=G.enemies.filter(e=>!e.dead);\n  G.shots=G.shots.filter(s=>!s.dead);\n  for(const p of G.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; }\n  G.parts=G.parts.filter(p=>p.life>0);\n  if(G.shake>0) G.shake=Math.max(0,G.shake-dt);\n\n  refreshShop();\n  updateTop();\n}\n\nfunction blockerFor(e){\n  let best=null,bd=1e9;\n  for(const u of G.units){ if(u.dead||u.row!==e.row) continue;\n    const d=e.x-u.x;\n    if(d>=-CW*0.1 && d<CW*0.5 && d<bd){ bd=d; best=u; } }\n  return best;\n}\nfunction fireShot(u,e,buff){\n  const c=CLAY[u.clay].col;\n  G.shots.push({x:u.x+18,y:u.y-4,vx:520,row:u.row,dmg:u.dmg*buff*TAL.dmgMult,fx:u.fx,\n    chainMax:u.chainMax||2, color:c, dead:false});\n}\nfunction applyFx(s,e){\n  if(s.fx===\"poison\"){ e.poison=Math.max(e.poison||0,3*TAL.freezeBonus); e.poisonDps=14*TAL.fxMult; }\n  else if(s.fx===\"slow\"){ e.slow=Math.max(e.slow||0,2.2*TAL.freezeBonus); }\n  else if(s.fx===\"splash\"){\n    for(const o of G.enemies){ if(o.dead||o===e||o.row!==s.row) continue;\n      if(Math.abs(o.x-s.x)<CW*0.9) damageEnemy(o,s.dmg*0.6*TAL.fxMult); }\n    spawnParts(s.x,s.y,\"#ffb03c\",10);\n  }\n  else if(s.fx===\"chain\"){\n    let hit=0; const maxHit=(s.chainMax||2)-1;\n    for(const o of G.enemies){ if(o.dead||o===e||o.row!==s.row) continue;\n      if(o.x>s.x && o.x-s.x<CW*2.6){ damageEnemy(o,s.dmg*0.7); spawnParts(o.x,o.y,\"#c98bff\",5); if(++hit>=maxHit) break; } }\n  }\n  else if(s.fx===\"rocket\"){\n    // 大范围爆炸：跨相邻行、全额伤害\n    for(const o of G.enemies){ if(o.dead||o===e) continue;\n      if(Math.abs(o.row-s.row)<=1 && Math.abs(o.x-s.x)<CW*1.6) damageEnemy(o, s.dmg*0.9); }\n    spawnParts(s.x,s.y,\"#ff7a3c\",26); spawnParts(s.x,s.y,\"#ffd76a\",16);\n    G.shake=0.25;\n  }\n}\n\n/* ============================ 波次逻辑 ============================ */\nfunction waveLogic(dt){\n  if(G.inWave){\n    // 生成\n    if(G.toSpawn.length){\n      G.spawnTimer-=dt;\n      if(G.spawnTimer<=0){\n        const nxt=G.toSpawn.shift();\n        spawnEnemy(nxt.type);\n        G.spawnTimer = nxt.delay;\n      }\n    } else if(G.enemies.length===0){\n      // 本波清空\n      G.inWave=false;\n      if(G.totalWaves>0 && G.wave>=G.totalWaves){ winGame(); return; } // 仅闯关有终点\n      G.waveTimer=6*TAL.waveGapMult; G.waveClearWait=1;\n      setWaveLabel(`第 ${G.wave} 波 已清除 · 备战中`);\n    }\n  } else if(!G.over){\n    G.waveTimer-=dt;\n    if(G.waveTimer<=0) startWave();\n  }\n}\nfunction startWave(){\n  G.wave++;\n  G.toSpawn=buildWave(G.wave);\n  G.spawnTimer=0.5; G.inWave=true;\n  const of = G.totalWaves>0 ? `/ ${G.totalWaves}` : \"· 无尽\";\n  setWaveLabel(`⚔ 第 ${G.wave} ${of} 波 来袭！`);\n  flash(`第 ${G.wave} 波 黑泥感染涌来！`);\n}\nfunction spawnEnemy(type){\n  const base=ENEMIES[type];\n  const row=Math.floor(Math.random()*ROWS);\n  // 随波增强 × 关卡难度；无尽模式成长更陡\n  const growth = G.mode===\"endless\" ? 0.16 : 0.12;\n  const scale=(1+ (G.wave-1)*growth) * G.diff;\n  G.enemies.push({ ...base, type, row, x:W+CW*0.5, y:rowCY(row),\n    maxhp:base.hp*scale, hp:base.hp*scale, dmg:base.dmg*(1+ (G.wave-1)*0.05)*G.diff,\n    timer:0.3, flashT:0, poison:0, slow:0, dead:false });\n}\nfunction breach(){\n  G.lives--; flash(\"⚠ 基地被突破！\"); spawnParts(20,H/2,\"#ff5c72\",20);\n  if(G.lives<=0) loseGame();\n}\nfunction setWaveLabel(t){ document.getElementById(\"wavelab\").textContent=\"· \"+t; }\n\n/* ============================ 结束 ============================ */\nfunction winGame(){ G.over=true; G.won=true; showEnd(); }\nfunction loseGame(){ G.over=true; G.won=false; showEnd(); }\nfunction showEnd(){\n  // 结算塑形点：击杀 + 波次 + 通关奖励\n  const earned = G.kills + G.wave*3 + (G.won?60:0);\n  SAVE.points += earned;\n  // 闯关：通关解锁下一关\n  let unlockedNext=false;\n  if(G.mode===\"campaign\" && G.won && G.level+1>SAVE.campaignCleared && G.level+1<LEVELS.length){\n    SAVE.campaignCleared=G.level+1; unlockedNext=true;\n  }\n  // 无尽：刷新最佳记录\n  let newRecord=false;\n  if(G.mode===\"endless\"){\n    if(G.wave>SAVE.bestWave){ SAVE.bestWave=G.wave; newRecord=true; }\n    if(G.kills>SAVE.bestKills) SAVE.bestKills=G.kills;\n  }\n  persist();\n\n  const ov=document.createElement(\"div\"); ov.className=\"overlay\"; ov.id=\"endScreen\";\n  let head, body;\n  if(G.mode===\"endless\"){\n    head=`<h1>🌀 无尽模式结束<span class=\"sub\">${newRecord?\"🎉 刷新最佳记录！\":\"黑泥无穷无尽…\"}</span></h1>`;\n    body=`<p>坚持到第 <b>${G.wave}</b> 波 · 击杀 <b>${G.kills}</b> 个感染体<br>历史最佳：第 <b style=\"color:#ffcf4a\">${SAVE.bestWave}</b> 波 · ${SAVE.bestKills} 击杀</p>`;\n  } else if(G.won){\n    head=`<h1>🏆 「${LEVELS[G.level].name}」通关！<span class=\"sub\">全 ${G.totalWaves} 波黑泥感染被击退</span></h1>`;\n    body=`<p>击杀 <b>${G.kills}</b> · 剩余基地 <b>${G.lives}</b> ❤️${unlockedNext?`<br>🔓 解锁新关卡：<b style=\"color:#ffcf4a\">${LEVELS[G.level+1].name}</b>`:(G.level+1>=LEVELS.length?\"<br>🎖️ 你已通关全部关卡！\":\"\")}</p>`;\n  } else {\n    head=`<h1>💥 基地失守<span class=\"sub\">「${LEVELS[G.level].name}」黑泥吞噬了前线…</span></h1>`;\n    body=`<p>坚持到第 <b>${G.wave}/${G.totalWaves}</b> 波 · 击杀 <b>${G.kills}</b> 个感染体<br>捏一支更强的军团再战！</p>`;\n  }\n  ov.innerHTML=head+body;\n  const gain=document.createElement(\"p\");\n  gain.innerHTML=`✨ 获得 <b style=\"color:#ffcf4a\">${earned}</b> 塑形点 · 当前共 <b style=\"color:#ffcf4a\">${SAVE.points}</b> 点`;\n  ov.appendChild(gain);\n\n  const wrap=document.createElement(\"div\"); wrap.style.cssText=\"display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;justify-content:center;\";\n  const mk=(txt,cls,fn)=>{ const b=document.createElement(\"button\"); b.className=\"btn\"+(cls?\" \"+cls:\"\");\n    b.style.cssText=\"font-size:15px;padding:10px 20px;\"; b.textContent=txt; b.onclick=fn; return b; };\n  if(unlockedNext) wrap.appendChild(mk(\"▶ 下一关\",\"\",()=>{ ov.remove(); startGame(\"campaign\",G.level+1); }));\n  wrap.appendChild(mk(\"🔁 重玩\",\"ghost\",()=>{ ov.remove(); startGame(G.mode,G.level); }));\n  wrap.appendChild(mk(\"🏠 模式选择\",\"ghost\",()=>{ ov.remove(); goHome(); }));\n  wrap.appendChild(mk(\"🌳 天赋树\",\"ghost\",()=>openTalents()));\n  wrap.appendChild(mk(\"🔬 科技树\",\"ghost\",()=>openTech()));\n  ov.appendChild(wrap);\n  document.getElementById(\"stage\").appendChild(ov);\n}\nfunction goHome(){\n  const es=document.getElementById(\"endScreen\"); if(es) es.remove();\n  G.running=false; G.over=true;\n  updateStartRecords();\n  const ss=document.getElementById(\"startScreen\"); if(ss) ss.style.display=\"flex\";\n}\nfunction updateStartRecords(){\n  const el=document.getElementById(\"startRecords\"); if(!el) return;\n  el.innerHTML=`🗺️ 闯关进度 <b style=\"color:#66e2a0\">${SAVE.campaignCleared}/${LEVELS.length}</b>　`+\n    `🌀 无尽最佳 <b style=\"color:#a45ce0\">第 ${SAVE.bestWave} 波</b>　`+\n    `✨ 塑形点 <b style=\"color:#ffcf4a\">${SAVE.points}</b>`;\n}\n\n/* ============================ 渲染 ============================ */\nfunction drawMap(){\n  // 橡皮泥垫底色（竖向柔和渐变）\n  const bg=ctx.createLinearGradient(0,0,0,H);\n  bg.addColorStop(0,\"#2b2440\"); bg.addColorStop(1,\"#1d1830\");\n  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);\n  // 行泳道：交替色 + 内嵌高光，像捏平的泥板\n  for(let r=0;r<ROWS;r++){\n    ctx.fillStyle = (r%2)?\"#241f37\":\"#2a2440\";\n    ctx.fillRect(0,r*CH,W,CH);\n    ctx.fillStyle=\"rgba(255,255,255,.025)\"; ctx.fillRect(0,r*CH,W,3);\n    ctx.fillStyle=\"rgba(0,0,0,.14)\"; ctx.fillRect(0,r*CH+CH-3,W,3);\n  }\n  // 左侧基地区\n  const baseG=ctx.createLinearGradient(0,0,CW*1.1,0);\n  baseG.addColorStop(0,\"rgba(102,226,160,.22)\"); baseG.addColorStop(1,\"rgba(102,226,160,0)\");\n  ctx.fillStyle=baseG; ctx.fillRect(0,0,CW*1.1,H);\n  ctx.font=`${Math.floor(CH*0.5)}px sans-serif`; ctx.textAlign=\"center\"; ctx.textBaseline=\"middle\";\n  for(let r=0;r<ROWS;r++) ctx.fillText(\"🏰\", CW*0.22, rowCY(r));\n  // 右侧感染入口\n  const infG=ctx.createLinearGradient(W-CW*1.1,0,W,0);\n  infG.addColorStop(0,\"rgba(120,60,140,0)\"); infG.addColorStop(1,\"rgba(150,50,90,.28)\");\n  ctx.fillStyle=infG; ctx.fillRect(W-CW*1.1,0,CW*1.1,H);\n  for(let r=0;r<ROWS;r++) ctx.fillText(\"☣️\", W-CW*0.2, rowCY(r));\n  // 网格线\n  ctx.strokeStyle=\"rgba(255,255,255,.05)\"; ctx.lineWidth=1;\n  for(let c=1;c<COLS;c++){ ctx.beginPath(); ctx.moveTo(c*CW,0); ctx.lineTo(c*CW,H); ctx.stroke(); }\n  // 资源点（矿点）\n  if(G.nodes) for(const key of G.nodes){\n    const [r,c]=key.split(\",\").map(Number);\n    const x=cellCX(c), y=rowCY(r), pulse=0.5+0.5*Math.sin(G.t*3+c+r);\n    ctx.save();\n    const glow=ctx.createRadialGradient(x,y,2,x,y,CW*0.5);\n    glow.addColorStop(0,`rgba(120,230,255,${0.28+0.18*pulse})`);\n    glow.addColorStop(1,\"rgba(120,230,255,0)\");\n    ctx.fillStyle=glow; ctx.fillRect(c*CW,r*CH,CW,CH);\n    ctx.font=`${Math.floor(CH*0.34)}px sans-serif`; ctx.textAlign=\"center\"; ctx.textBaseline=\"middle\";\n    ctx.globalAlpha=0.9; ctx.fillText(\"💎\", x, y+CH*0.02); ctx.globalAlpha=1;\n    ctx.restore();\n  }\n}\nfunction render(){\n  ctx.clearRect(0,0,W,H);\n  ctx.save();\n  if(G&&G.shake>0){ const s=G.shake*14; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }\n  drawMap();\n\n  // 悬停高亮（P1 鼠标）\n  if(G.running&&!G.over&&G.hoverCell&&G.selected){\n    const {c,r}=G.hoverCell; const ok=!G.grid[r][c];\n    ctx.fillStyle= ok?\"rgba(255,207,74,.20)\":\"rgba(255,92,114,.22)\";\n    ctx.fillRect(c*CW+2,r*CH+2,CW-4,CH-4);\n    if(ok){ const u=UNITS.find(x=>x.id===G.selected);\n      ctx.globalAlpha=.5; drawBlob(cellCX(c),rowCY(r),CLAY[u.clay].col,u.ico,0); ctx.globalAlpha=1; }\n  }\n  // P2 光标（键盘）\n  if(G.twoP&&G.running&&!G.over){\n    const {c,r}=G.cursor; const ok=!G.grid[r][c];\n    ctx.strokeStyle=\"#5fd0e0\"; ctx.lineWidth=3;\n    const pulse=2+Math.sin(G.t*6)*1.5;\n    ctx.strokeRect(c*CW+3+pulse*0.3,r*CH+3+pulse*0.3,CW-6-pulse*0.6,CH-6-pulse*0.6);\n    if(ok&&G.sel2){ const u=UNITS.find(x=>x.id===G.sel2);\n      if(u){ ctx.globalAlpha=.45; drawBlob(cellCX(c),rowCY(r),CLAY[u.clay].col,u.ico,0); ctx.globalAlpha=1; } }\n    // P2 当前选择标签\n    const su=UNITS.find(x=>x.id===G.sel2);\n    if(su){ const rdy=(G.cd2[su.id]||0)<=0 && G.clay>=su.cost;\n      const txt=`P2▸${su.ico}${su.name} ${su.cost}`;\n      ctx.font=\"bold 11px sans-serif\"; ctx.textAlign=\"center\"; ctx.textBaseline=\"middle\";\n      const tw=ctx.measureText(txt).width+10;\n      ctx.fillStyle=\"rgba(8,52,58,.85)\"; ctx.fillRect(c*CW+CW/2-tw/2, r*CH+2, tw, 16);\n      ctx.fillStyle=rdy?\"#7fe9f5\":\"#ff8fa0\"; ctx.fillText(txt, c*CW+CW/2, r*CH+11);\n    } else { ctx.fillStyle=\"#5fd0e0\"; ctx.font=\"bold 11px sans-serif\"; ctx.textAlign=\"center\"; ctx.textBaseline=\"bottom\";\n      ctx.fillText(\"P2 按,/.选兵\", c*CW+CW/2, r*CH+CH-3); }\n  }\n\n  // 子弹\n  for(const s of G.shots){\n    ctx.fillStyle=s.color;\n    ctx.beginPath(); ctx.arc(s.x,s.y,6,0,7); ctx.fill();\n    ctx.fillStyle=\"rgba(255,255,255,.5)\"; ctx.beginPath(); ctx.arc(s.x-3,s.y-2,2,0,7); ctx.fill();\n  }\n\n  // 单位\n  for(const u of G.units){\n    const c=CLAY[u.clay].col;\n    if(G.twoP&&u.owner===2){ // P2 单位青色标记环\n      ctx.strokeStyle=\"rgba(95,208,224,.8)\"; ctx.lineWidth=2.5;\n      ctx.beginPath(); ctx.arc(u.x,u.y+(u.sink||0),Math.min(CW,CH)*0.4,0,7); ctx.stroke();\n    }\n    drawBlob(u.x,u.y+ (u.sink||0), c, u.ico, u.flashT>0?1:0, u.attackFx>0?8:0);\n    hpbar(u.x,u.y-CH*0.34,u.hp,u.maxhp,\"#66e2a0\");\n    if(u.role===\"factory\"){ // 等级标记\n      ctx.fillStyle=\"#ffcf4a\"; ctx.font=\"bold 12px sans-serif\"; ctx.textAlign=\"center\"; ctx.textBaseline=\"middle\";\n      ctx.fillText(\"Lv\"+(u.lvl+1), u.x, u.y+CH*0.30);\n    }\n  }\n  // 敌人\n  for(const e of G.enemies){\n    const yo = e.fly ? -14+Math.sin(G.t*5+e.x*0.05)*5 : 0; // 飞行浮动\n    if(e.fly){ ctx.fillStyle=\"rgba(0,0,0,.25)\"; ctx.beginPath();\n      ctx.ellipse(e.x,e.y+CH*0.24,CW*0.16,CH*0.05,0,0,7); ctx.fill(); }\n    drawBlob(e.x,e.y+yo,e.col,e.ico,e.flashT>0?1:0,0,true, e.slow>0);\n    hpbar(e.x,e.y+yo-CH*0.34,e.hp,e.maxhp,\"#ff7a8a\");\n    if(e.poison>0){ ctx.fillStyle=\"rgba(95,191,106,.9)\"; ctx.font=\"12px sans-serif\"; ctx.textAlign=\"center\"; ctx.fillText(\"☠\",e.x+14,e.y+yo-14); }\n  }\n  // 粒子\n  for(const p of G.parts){\n    ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.col;\n    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();\n  }\n  ctx.globalAlpha=1;\n  ctx.restore();\n}\n\nfunction drawBlob(x,y,col,ico,flash,punch,enemy,frozen){\n  const R=Math.min(CW,CH)*0.36 + (punch||0);\n  // 影子\n  ctx.fillStyle=\"rgba(0,0,0,.28)\"; ctx.beginPath();\n  ctx.ellipse(x,y+R*0.75,R*0.9,R*0.32,0,0,7); ctx.fill();\n  // 身体（橡皮泥质感）\n  const g=ctx.createRadialGradient(x-R*0.3,y-R*0.4,R*0.2,x,y,R*1.1);\n  g.addColorStop(0, lighten(col,40)); g.addColorStop(1, col);\n  ctx.fillStyle= flash? \"#ffffff\": g;\n  roundBlob(x,y,R);\n  ctx.fill();\n  // 高光\n  ctx.fillStyle=\"rgba(255,255,255,.25)\"; ctx.beginPath();\n  ctx.ellipse(x-R*0.35,y-R*0.4,R*0.28,R*0.18,-0.5,0,7); ctx.fill();\n  if(frozen){ ctx.fillStyle=\"rgba(120,220,255,.35)\"; roundBlob(x,y,R); ctx.fill(); }\n  // 图标\n  ctx.font=`${Math.floor(R*1.05)}px sans-serif`; ctx.textAlign=\"center\"; ctx.textBaseline=\"middle\";\n  ctx.fillText(ico,x,y+R*0.06);\n}\nfunction roundBlob(x,y,R){\n  ctx.beginPath();\n  // 略带不规则的“捏出来”外形\n  const n=8;\n  for(let i=0;i<=n;i++){ const a=i/n*Math.PI*2;\n    const rr=R*(0.92+0.08*Math.sin(a*3+x*0.01));\n    const px=x+Math.cos(a)*rr, py=y+Math.sin(a)*rr*0.95;\n    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }\n  ctx.closePath();\n}\nfunction hpbar(x,y,hp,max,col){\n  if(hp>=max) return;\n  const w=CW*0.5, h=5, f=Math.max(0,hp/max);\n  ctx.fillStyle=\"rgba(0,0,0,.5)\"; ctx.fillRect(x-w/2,y,w,h);\n  ctx.fillStyle=col; ctx.fillRect(x-w/2,y,w*f,h);\n}\nfunction spawnParts(x,y,col,n){\n  for(let i=0;i<n;i++){ const a=Math.random()*7,s=40+Math.random()*120;\n    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,r:2+Math.random()*3,col,life:0.5,max:0.5}); }\n}\nfunction lighten(hex,amt){\n  const h=hex.replace('#',''); let r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);\n  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);\n  return `rgb(${r},${g},${b})`;\n}\n\n/* ============================ 顶栏 & 控制 ============================ */\nfunction updateTop(){\n  document.getElementById(\"clay\").textContent=Math.floor(G.clay);\n  document.getElementById(\"lives\").textContent=G.lives;\n  document.getElementById(\"kills\").textContent=G.kills;\n}\ndocument.getElementById(\"pauseBtn\").onclick=()=>{\n  if(!G.running||G.over) return;\n  G.paused=!G.paused;\n  document.getElementById(\"pauseBtn\").textContent=G.paused?\"▶ 继续\":\"⏸ 暂停\";\n};\ndocument.getElementById(\"campaignBtn\").onclick=()=>openLevels();\ndocument.getElementById(\"endlessBtn\").onclick=()=>startGame(\"endless\",0);\ndocument.getElementById(\"coopBtn\").onclick=()=>startGame(\"endless\",0,true);\nfunction startGame(mode,level,twoP){\n  computeTAL(); buildShop();\n  const ss=document.getElementById(\"startScreen\"); if(ss) ss.style.display=\"none\";\n  const es=document.getElementById(\"endScreen\"); if(es) es.remove();\n  const tp=document.getElementById(\"talentScreen\"); if(tp) tp.remove();\n  const lp=document.getElementById(\"levelScreen\"); if(lp) lp.remove();\n  newGame(mode,level,twoP); G.running=true;\n  document.getElementById(\"pauseBtn\").textContent=\"⏸ 暂停\";\n  let modeLab = mode===\"endless\" ? \"🌀 无尽模式\" : `🗺️ ${LEVELS[level].name}`;\n  if(twoP) modeLab=\"👥 双人合作 · \"+modeLab;\n  setWaveLabel(modeLab+\" · 准备中，快放置单位！\");\n  if(twoP){ G.sel2=\"recruit\"; flash(\"👥 双人合作！P1🖱️鼠标 · P2⌨️方向键移动·逗号句号选兵·回车放置\"); }\n  // 黑泥馈赠：开局免费近卫\n  if(TAL.freeGuard){\n    const gu=UNITS.find(u=>u.id===\"guard\");\n    const unit=makeUnit(gu,1,2); unit.owner=1; G.grid[2][1]=unit; G.units.push(unit);\n    spawnParts(unit.x,unit.y,\"#ffcf4a\",14);\n  }\n  refreshShop(); updateTop();\n}\n\n/* ============================ 关卡选择 UI ============================ */\nfunction openLevels(){\n  const old=document.getElementById(\"levelScreen\"); if(old) old.remove();\n  const ov=document.createElement(\"div\"); ov.className=\"overlay\"; ov.id=\"levelScreen\";\n  const head=document.createElement(\"div\"); head.className=\"tHead\";\n  head.innerHTML=`<h1>🗺️ 选择关卡</h1><span class=\"tPts\">最高通关：${SAVE.campaignCleared}/${LEVELS.length}</span>`;\n  ov.appendChild(head);\n\n  const grid=document.createElement(\"div\"); grid.className=\"lvGrid\";\n  LEVELS.forEach((lv,i)=>{\n    const cleared = i<SAVE.campaignCleared;      // 已通关\n    const unlocked = i<=SAVE.campaignCleared;     // 可进入（已通关的下一关）\n    const c=document.createElement(\"div\");\n    c.className=\"lvCard \"+(cleared?\"done\":unlocked?\"open\":\"locked\");\n    c.innerHTML=`<div class=\"lvno\">第 ${i+1} 关</div>\n      <div class=\"lvname\">${lv.name}</div>\n      <div class=\"lvmeta\">${lv.waves} 波 · 难度 ${\"🔥\".repeat(Math.round(lv.diff*2))}<br>${lv.tip}</div>\n      <div class=\"lvbadge\">${cleared?\"✅\":unlocked?\"⚔️\":\"🔒\"}</div>`;\n    if(unlocked) c.onclick=()=>{ ov.remove(); startGame(\"campaign\",i); };\n    grid.appendChild(c);\n  });\n  ov.appendChild(grid);\n\n  const foot=document.createElement(\"div\"); foot.className=\"tFoot\";\n  const back=document.createElement(\"button\"); back.className=\"btn ghost\"; back.style.cssText=\"font-size:15px;padding:9px 24px;\";\n  back.textContent=\"← 返回\"; back.onclick=()=>{ ov.remove();\n    const ss=document.getElementById(\"startScreen\"); if(ss) ss.style.display=\"flex\"; };\n  foot.appendChild(back); ov.appendChild(foot);\n  document.getElementById(\"stage\").appendChild(ov);\n}\n\n/* ============================ 天赋树 UI ============================ */\ndocument.getElementById(\"talentBtn\").onclick=()=>openTalents();\nfunction openTalents(){\n  const old=document.getElementById(\"talentScreen\"); if(old) old.remove();\n  const ov=document.createElement(\"div\"); ov.className=\"overlay\"; ov.id=\"talentScreen\";\n\n  const head=document.createElement(\"div\"); head.className=\"tHead\";\n  head.innerHTML=`<h1>🌳 塑形天赋树</h1><span class=\"tPts\">✨ 塑形点：${SAVE.points}</span>`;\n  ov.appendChild(head);\n\n  const tree=document.createElement(\"div\"); tree.className=\"tTree\";\n  for(let b=0;b<4;b++){\n    const col=document.createElement(\"div\"); col.className=\"tCol\";\n    const h=document.createElement(\"div\"); h.className=\"tColH\"; h.textContent=BRANCH_NAME[b];\n    col.appendChild(h);\n    const nodes=TALENTS.filter(t=>t.branch===b).sort((a,c)=>a.tier-c.tier);\n    nodes.forEach((t,i)=>{\n      if(i>0){ const lk=document.createElement(\"div\"); lk.className=\"tLink\"+(isUnlocked(t.id)?\" on\":\"\"); col.appendChild(lk); }\n      const owned=isUnlocked(t.id), avail=canUnlock(t);\n      const n=document.createElement(\"div\");\n      n.className=\"tNode \"+(owned?\"owned\":avail?\"avail\":\"locked\");\n      n.innerHTML=`<div class=\"tico\">${t.ico}</div><div class=\"tname\">${t.name}</div>\n        <div class=\"tdesc\">${t.desc}</div>\n        <div class=\"tcost\">${owned?\"✔ 已解锁\":\"✨ \"+t.cost}</div>`;\n      n.onclick=()=>tryUnlock(t);\n      col.appendChild(n);\n    });\n    tree.appendChild(col);\n  }\n  ov.appendChild(tree);\n\n  const foot=document.createElement(\"div\"); foot.className=\"tFoot\";\n  const back=document.createElement(\"button\"); back.className=\"btn\"; back.style.cssText=\"font-size:15px;padding:9px 24px;\";\n  back.textContent=\"✔ 完成\"; back.onclick=()=>{ ov.remove();\n    if(!G.running||G.over){ const ss=document.getElementById(\"startScreen\"); if(ss) ss.style.display=\"flex\";\n      const es=document.getElementById(\"endScreen\"); if(es) es.style.display=\"flex\"; } };\n  const reset=document.createElement(\"button\"); reset.className=\"btn ghost\"; reset.style.cssText=\"font-size:15px;padding:9px 20px;\";\n  reset.textContent=\"↺ 重置返还\"; reset.title=\"退还全部天赋，返还塑形点\";\n  reset.onclick=()=>{ SAVE.points += TALENTS.filter(t=>isUnlocked(t.id)).reduce((s,t)=>s+t.cost,0);\n    SAVE.unlocked=[]; persist(); openTalents(); };\n  foot.appendChild(back); foot.appendChild(reset); ov.appendChild(foot);\n\n  document.getElementById(\"stage\").appendChild(ov);\n}\nfunction tryUnlock(t){\n  if(isUnlocked(t.id)){ flashTree(\"已经解锁啦\"); return; }\n  if(!(t.req.length===0||t.req.some(r=>isUnlocked(r)))){ flashTree(\"需要先解锁上一层天赋\"); return; }\n  if(SAVE.points<t.cost){ flashTree(\"塑形点不足——去战场击杀黑泥吧！\"); return; }\n  SAVE.points-=t.cost; SAVE.unlocked.push(t.id); persist();\n  computeTAL(); openTalents();\n}\nfunction flashTree(msg){\n  const h=document.querySelector(\"#talentScreen .tPts\");\n  if(h){ h.textContent=msg; h.style.color=\"#ff5c72\";\n    setTimeout(()=>{ h.textContent=\"✨ 塑形点：\"+SAVE.points; h.style.color=\"\"; },1100); }\n}\n\n/* ============================ 科技树 UI ============================ */\ndocument.getElementById(\"techBtn\").onclick=()=>openTech();\nfunction openTech(){\n  const old=document.getElementById(\"talentScreen\"); if(old) old.remove();\n  const ov=document.createElement(\"div\"); ov.className=\"overlay\"; ov.id=\"talentScreen\";\n  const head=document.createElement(\"div\"); head.className=\"tHead\";\n  head.innerHTML=`<h1>🔬 科技树 · 兵种升级</h1><span class=\"tPts\">✨ 塑形点：${SAVE.points}</span>`;\n  ov.appendChild(head);\n\n  const tree=document.createElement(\"div\"); tree.className=\"tTree\"; tree.style.gridTemplateColumns=\"repeat(3,1fr)\";\n  for(let b=0;b<3;b++){\n    const col=document.createElement(\"div\"); col.className=\"tCol\";\n    const h=document.createElement(\"div\"); h.className=\"tColH\"; h.textContent=TECH_BRANCH[b];\n    col.appendChild(h);\n    const nodes=TECH.filter(t=>t.branch===b).sort((a,c)=>a.tier-c.tier);\n    nodes.forEach((t,i)=>{\n      if(i>0){ const lk=document.createElement(\"div\"); lk.className=\"tLink\"+(isTech(t.id)?\" on\":\"\"); col.appendChild(lk); }\n      const owned=isTech(t.id), avail=canTech(t);\n      const n=document.createElement(\"div\");\n      n.className=\"tNode \"+(owned?\"owned\":avail?\"avail\":\"locked\");\n      const tag = t.kind===\"unlock\" ? '<span style=\"color:#66e2a0\">🔓解锁</span> ' : '<span style=\"color:#ffcf4a\">⬆升级</span> ';\n      n.innerHTML=`<div class=\"tico\">${t.ico}</div><div class=\"tname\">${t.name}</div>\n        <div class=\"tdesc\">${tag}${t.desc}</div>\n        <div class=\"tcost\">${owned?\"✔ 已研发\":\"✨ \"+t.cost}</div>`;\n      n.onclick=()=>tryTech(t);\n      col.appendChild(n);\n    });\n    tree.appendChild(col);\n  }\n  ov.appendChild(tree);\n\n  const foot=document.createElement(\"div\"); foot.className=\"tFoot\";\n  const back=document.createElement(\"button\"); back.className=\"btn\"; back.style.cssText=\"font-size:15px;padding:9px 24px;\";\n  back.textContent=\"✔ 完成\"; back.onclick=()=>{ ov.remove();\n    if(!G.running||G.over){ const ss=document.getElementById(\"startScreen\"); if(ss) ss.style.display=\"flex\";\n      const es=document.getElementById(\"endScreen\"); if(es) es.style.display=\"flex\"; } };\n  const reset=document.createElement(\"button\"); reset.className=\"btn ghost\"; reset.style.cssText=\"font-size:15px;padding:9px 20px;\";\n  reset.textContent=\"↺ 重置返还\";\n  reset.onclick=()=>{ SAVE.points += TECH.filter(t=>isTech(t.id)).reduce((s,t)=>s+t.cost,0);\n    SAVE.techUnlocked=[]; persist(); computeTAL(); openTech(); };\n  foot.appendChild(back); foot.appendChild(reset); ov.appendChild(foot);\n  document.getElementById(\"stage\").appendChild(ov);\n}\nfunction tryTech(t){\n  if(isTech(t.id)){ flashTree(\"已经研发啦\"); return; }\n  if(!(t.req.length===0||t.req.some(r=>isTech(r)))){ flashTree(\"需要先研发前置科技\"); return; }\n  if(SAVE.points<t.cost){ flashTree(\"塑形点不足——去战场击杀黑泥吧！\"); return; }\n  SAVE.points-=t.cost; SAVE.techUnlocked.push(t.id); persist();\n  computeTAL(); openTech();\n}\n\n/* ============================ 材料图例 ============================ */\nfunction buildLore(){\n  const box=document.getElementById(\"loreBox\");\n  Object.values(CLAY).forEach(c=>{\n    const s=document.createElement(\"div\"); s.className=\"swatch\";\n    s.innerHTML=`<span class=\"dot\" style=\"background:${c.col}\"></span>${c.name} ${\"★\".repeat(c.star)}`;\n    box.appendChild(s);\n  });\n}\n\n/* ============================ 启动 ============================ */\ncomputeTAL(); newGame(); buildShop(); buildLore(); updateStartRecords();\nrequestAnimationFrame(loop);\n<\/script>\n</body>\n</html>\n" },
  brick: { name:"方砖破坏者",           html: "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>方砖破坏者 · Brick Breaker</title>\n<style>\n  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;\n    font-family:\"Courier New\",ui-monospace,Menlo,Consolas,monospace;}\n  :root{--bg:#0e0e12;--panel:#1a1a22;--panel2:#25252f;--ink:#f0f0f5;--muted:#8a8a99;\n    --blue:#3b6fd4;--red:#d8433a;--yellow:#e6c02e;--green:#2f9e44;--gold:#ffce3a;}\n  html,body{height:100%;background:#000;color:var(--ink);overflow:hidden;}\n  #app{height:100%;display:flex;align-items:center;justify-content:center;}\n  #game{position:relative;width:96vmin;max-width:820px;aspect-ratio:600/660;\n    border-radius:6px;\n    box-shadow:0 0 0 3px #000,0 0 0 9px #2c2c3c,0 0 0 12px #000,0 14px 50px rgba(0,0,0,.85);}\n  canvas{width:100%;height:100%;display:block;background:#0e0e12;\n    image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;}\n  /* 覆盖层 */\n  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;\n    background:#0e0e12;padding:18px;text-align:center;gap:10px;z-index:10;overflow-y:auto;}\n  .screen.hidden{display:none;}\n  h1.title{font-size:34px;letter-spacing:4px;font-weight:900;\n    background:linear-gradient(90deg,#3b6fd4,#d8433a,#e6c02e,#2f9e44);-webkit-background-clip:text;background-clip:text;color:transparent;\n    text-shadow:0 2px 0 rgba(0,0,0,.4);}\n  .ver{font-size:11px;color:var(--muted);margin-top:-6px;}\n  .btn{cursor:pointer;border:none;border-radius:8px;padding:11px 20px;font-weight:800;font-size:15px;\n    background:var(--gold);color:#2a2000;box-shadow:0 4px 0 #b58f12;transition:transform .05s;min-width:190px;}\n  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b58f12;}\n  .btn.sm{min-width:0;font-size:13px;padding:8px 14px;}\n  .btn.ghost{background:var(--panel2);color:var(--ink);box-shadow:0 4px 0 #14141a;}\n  .btn.blue{background:var(--blue);color:#fff;box-shadow:0 4px 0 #24478a;}\n  .btn.red{background:var(--red);color:#fff;box-shadow:0 4px 0 #8a2a24;}\n  .btn.green{background:var(--green);color:#fff;box-shadow:0 4px 0 #1c6329;}\n  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center;}\n  .statbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:13px;color:var(--muted);}\n  .statbar b{color:var(--gold);}\n  .card{background:var(--panel);border:1px solid #33333f;border-radius:10px;padding:12px;width:100%;max-width:520px;text-align:left;}\n  .card h3{font-size:15px;margin-bottom:8px;color:var(--gold);}\n  .card p,.card li{font-size:12px;color:#cfcfda;line-height:1.7;}\n  .card ul{padding-left:18px;}\n  .close-x{position:absolute;top:12px;right:14px;font-size:20px;cursor:pointer;color:var(--muted);z-index:2;}\n  .diff{display:flex;flex-direction:column;gap:10px;width:100%;max-width:460px;}\n  .diffcard{background:var(--panel);border:2px solid #33333f;border-radius:12px;padding:14px;cursor:pointer;text-align:left;transition:border-color .1s;}\n  .diffcard:hover{border-color:var(--gold);}\n  .diffcard h3{font-size:17px;margin-bottom:4px;}\n  .diffcard .d{font-size:11px;color:var(--muted);line-height:1.6;}\n  /* 天赋/商店网格 */\n  .tgrid{display:flex;flex-direction:column;align-items:center;gap:6px;max-width:560px;width:100%;}\n  .trow{display:flex;gap:10px;justify-content:center;width:100%;}\n  .node{background:var(--panel);border:2px solid #444;border-radius:9px;padding:7px 6px;width:110px;font-size:11px;text-align:center;cursor:pointer;transition:.1s;}\n  .node.owned{border-color:var(--green);background:#16241a;}\n  .node.avail{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,206,58,.25);}\n  .node.locked{opacity:.45;}\n  .node .nm{font-weight:800;font-size:12px;}\n  .node .cost{color:var(--gold);font-size:10px;margin-top:2px;}\n  .shopitem{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel);\n    border:1px solid #33333f;border-radius:9px;padding:9px 12px;width:100%;max-width:520px;font-size:12px;}\n  .shopitem .nm{font-weight:700;}\n  .shopitem .sub{color:var(--muted);font-size:10px;}\n  .toggle{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel);\n    border:1px solid #33333f;border-radius:9px;padding:9px 12px;width:100%;max-width:420px;font-size:13px;}\n  .sw{width:44px;height:24px;border-radius:20px;background:#444;position:relative;cursor:pointer;transition:.15s;flex:0 0 auto;}\n  .sw.on{background:var(--green);}\n  .sw::after{content:\"\";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;}\n  .sw.on::after{left:22px;}\n  .lb{width:100%;max-width:460px;}\n  .lbrow{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid #33333f;border-radius:8px;\n    padding:8px 12px;margin-bottom:6px;font-size:13px;}\n  .lbrow .rk{font-weight:900;width:24px;color:var(--gold);}\n  .lbrow .nm{flex:1;text-align:left;}\n  .lbrow .sc{font-weight:800;color:#9fd6ff;}\n  input.name{padding:9px 12px;border-radius:8px;border:1px solid #444;background:#111;color:#fff;font-size:15px;text-align:center;width:200px;}\n  .toast{position:absolute;top:54px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #444;\n    padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;z-index:20;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}\n  .toast.show{opacity:1;}\n  .scrollwrap{max-height:100%;overflow-y:auto;display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;padding:6px;}\n  .hint{font-size:11px;color:var(--muted);}\n</style>\n</head>\n<body>\n<div id=\"app\">\n<div id=\"game\">\n  <canvas id=\"cv\" width=\"600\" height=\"660\"></canvas>\n  <div class=\"toast\" id=\"toast\"></div>\n\n  <!-- 主界面 -->\n  <div class=\"screen\" id=\"menu\">\n    <div class=\"statbar\">最高分 <b id=\"mHigh\">0</b> · 本局 <b id=\"mScore\">0</b> · 💰<b id=\"mCoins\">0</b> · 天赋点 <b id=\"mTp\">0</b>\n      <span class=\"btn sm ghost\" id=\"refreshBtn\" style=\"min-width:0;padding:4px 8px;\">🔄刷新</span></div>\n    <h1 class=\"title\">方砖破坏者</h1>\n    <div class=\"ver\">BRICK BREAKER · v1.0</div>\n    <button class=\"btn green\" id=\"continueBtn\" style=\"display:none;\">⏵ 继续游戏</button>\n    <button class=\"btn\" id=\"startBtn\">▶ 开始游戏</button>\n    <button class=\"btn ghost\" id=\"talentBtn\">🌳 天赋树</button>\n    <button class=\"btn ghost\" id=\"shopBtn\">🛒 道具商店</button>\n    <button class=\"btn ghost\" id=\"manualBtn\">📖 游戏说明书</button>\n    <button class=\"btn ghost\" id=\"lbBtn\">🏆 排行榜</button>\n    <button class=\"btn sm red\" id=\"cheatBtn\" style=\"margin-top:4px;\">🐞 外挂菜单</button>\n  </div>\n\n  <!-- 难度选择 -->\n  <div class=\"screen hidden\" id=\"diffScreen\">\n    <span class=\"close-x\" data-back>✕</span>\n    <h1 class=\"title\" style=\"font-size:24px;\">选择难度</h1>\n    <div class=\"diff\" id=\"diffList\"></div>\n  </div>\n\n  <!-- 外挂菜单 -->\n  <div class=\"screen hidden\" id=\"cheatScreen\">\n    <span class=\"close-x\" data-back>✕</span>\n    <h1 class=\"title\" style=\"font-size:22px;\">🐞 外挂菜单</h1>\n    <p class=\"hint\">⚠ 开启任意外挂后，本局分数将不会计入排行榜与最高分。</p>\n    <div class=\"toggle\"><span>无限金币</span><div class=\"sw\" data-cheat=\"coins\"></div></div>\n    <div class=\"toggle\"><span>无限血量</span><div class=\"sw\" data-cheat=\"hp\"></div></div>\n    <div class=\"toggle\"><span>无限攻击</span><div class=\"sw\" data-cheat=\"atk\"></div></div>\n    <div class=\"toggle\"><span>无限天赋</span><div class=\"sw\" data-cheat=\"talent\"></div></div>\n  </div>\n\n  <!-- 天赋树 -->\n  <div class=\"screen hidden\" id=\"talentScreen\">\n    <span class=\"close-x\" data-back>✕</span>\n    <div class=\"scrollwrap\">\n      <h1 class=\"title\" style=\"font-size:22px;\">🌳 天赋树</h1>\n      <div class=\"statbar\">天赋点 <b id=\"tTp\">0</b>（击杀Boss可得 3-5 点）</div>\n      <div class=\"tgrid\" id=\"talentGrid\"></div>\n      <button class=\"btn sm ghost\" id=\"talentReset\">↺ 重置返还</button>\n    </div>\n  </div>\n\n  <!-- 道具商店 -->\n  <div class=\"screen hidden\" id=\"shopScreen\">\n    <span class=\"close-x\" data-back>✕</span>\n    <div class=\"scrollwrap\">\n      <h1 class=\"title\" style=\"font-size:22px;\">🛒 道具商店</h1>\n      <div class=\"statbar\">💰 金币 <b id=\"sCoins\">0</b> · 购买的临时道具在接下来 3 局内生效</div>\n      <div id=\"shopList\" style=\"width:100%;display:flex;flex-direction:column;align-items:center;gap:7px;\"></div>\n    </div>\n  </div>\n\n  <!-- 说明书 -->\n  <div class=\"screen hidden\" id=\"manualScreen\">\n    <span class=\"close-x\" data-back>✕</span>\n    <div class=\"scrollwrap\">\n      <h1 class=\"title\" style=\"font-size:22px;\">📖 游戏说明书</h1>\n      <div id=\"manualBody\" style=\"width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;\"></div>\n    </div>\n  </div>\n\n  <!-- 排行榜 -->\n  <div class=\"screen hidden\" id=\"lbScreen\">\n    <span class=\"close-x\" data-back>✕</span>\n    <h1 class=\"title\" style=\"font-size:22px;\">🏆 排行榜</h1>\n    <div class=\"lb\" id=\"lbList\"></div>\n    <button class=\"btn sm ghost\" id=\"lbClear\">清空排行榜</button>\n  </div>\n\n  <!-- 结算 -->\n  <div class=\"screen hidden\" id=\"overScreen\">\n    <h1 class=\"title\" id=\"overTitle\" style=\"font-size:26px;\">游戏结束</h1>\n    <div class=\"statbar\" id=\"overStats\"></div>\n    <div id=\"overNameBox\" style=\"display:flex;flex-direction:column;gap:8px;align-items:center;\">\n      <div class=\"hint\">上榜了！输入你的名字：</div>\n      <input class=\"name\" id=\"nameInput\" maxlength=\"8\" placeholder=\"玩家\" value=\"玩家\">\n      <button class=\"btn sm green\" id=\"saveScore\">保存成绩</button>\n    </div>\n    <div class=\"row\">\n      <button class=\"btn sm blue\" id=\"againBtn\">🔁 再来一局</button>\n      <button class=\"btn sm ghost\" id=\"homeBtn\">🏠 主界面</button>\n    </div>\n  </div>\n\n  <!-- 暂停菜单（半透明覆盖，可继续） -->\n  <div class=\"screen hidden\" id=\"pauseScreen\" style=\"background:rgba(8,9,14,.84);z-index:12;\">\n    <h1 class=\"title\" style=\"font-size:30px;\">⏸ 暂停</h1>\n    <button class=\"btn green\" id=\"resumeBtn\">⏵ 继续游戏</button>\n    <button class=\"btn ghost sm\" id=\"restartBtn\">🔄 重新开始</button>\n    <button class=\"btn ghost sm\" id=\"pauseHomeBtn\">🏠 返回主界面</button>\n    <div class=\"hint\">（回主界面后可在菜单点「继续游戏」回到本局）</div>\n  </div>\n\n  <!-- 游戏内右上控制（暂停/静音/退出）用 DOM 便于点击 -->\n  <div id=\"hudCtl\" style=\"position:absolute;top:8px;right:10px;display:none;gap:12px;z-index:9;\">\n    <span class=\"hbtn\" id=\"pauseBtn\" style=\"cursor:pointer;font-size:18px;\">⏸</span>\n    <span class=\"hbtn\" id=\"muteBtn\" style=\"cursor:pointer;font-size:18px;\">🔊</span>\n    <span class=\"hbtn\" id=\"quitBtn\" style=\"cursor:pointer;font-size:18px;\">✕</span>\n  </div>\n</div>\n</div>\n\n<script>\n\"use strict\";\n/*========================================================================\n  方砖破坏者 Brick Breaker — 单文件实现\n  逻辑(update)不触碰 canvas，便于无头测试；render 单独负责绘制。\n========================================================================*/\nconst cv=document.getElementById(\"cv\"), ctx=cv.getContext(\"2d\");\nconst W=600, H=660;\nconst TOP=52;                 // 顶部HUD高度\n// 游戏区（比整屏更小，四周留出机台边框）\nconst PF={L:52, R:548, top:TOP+16};\nconst rand=(a,b)=>a+Math.random()*(b-a);\nconst clamp=(v,a,b)=>v<a?a:v>b?b:v;\n\n/*---------------- 颜色/砖块类型 ----------------*/\nconst ROWCOL=[\"#3b6fd4\",\"#d8433a\",\"#e6c02e\",\"#2f9e44\"]; // 蓝红黄绿\nconst COLS=7;\n// 砖块类型定义（爆破率为草稿设定；实际用加权抽取）\nconst BT={\n  normal :{score:50 , w:0,   name:\"普通砖块\"},\n  func   :{score:150, w:35,  name:\"功能砖块\", ico:\"➕\"},\n  heart  :{score:150, w:20,  name:\"血量砖块\", ico:\"❤\"},\n  ball   :{score:100, w:20,  name:\"小球砖块\", ico:\"◔\"},\n  thick  :{score:80 , w:15,  name:\"厚砖块\",   ico:\"▦\", hp:2},\n  invis  :{score:200, w:15,  name:\"隐形砖块\", ico:\"⬚\", invis:true},\n  tnt    :{score
