:100, w:15,  name:\"TNT砖块\",  ico:\"💥\"},\n  coin   :{score:60 , w:5,   name:\"金币砖块\", ico:\"$\"},\n  special:{score:120, w:12,  name:\"水缸/太空\", ico:\"▨\", shard:true},\n  boss   :{score:0  , w:3,   name:\"老板砖块\", ico:\"☠\"},\n};\n\n/*---------------- 存档 ----------------*/\nconst SKEY=\"brickBreakerSave_v1\";\nlet SAVE=load();\nfunction load(){\n  const def={high:0,coins:0,tp:0,talents:[],shopPerm:{},shopTemp:{},board:[],noRecord:0};\n  try{const s=JSON.parse(localStorage.getItem(SKEY)); if(s&&s.board) return Object.assign(def,s);}catch(e){}\n  return def;\n}\nfunction save(){try{localStorage.setItem(SKEY,JSON.stringify(SAVE));}catch(e){}}\n\n/*---------------- 天赋树 ----------------*/\n// 每列自上而下线性解锁；根节点“开始”先解锁\nconst TAL=[\n  {id:\"root\", nm:\"开始\", cost:0, req:[], col:1, eff:m=>{}},\n  // 攻击列 (col0)\n  {id:\"a1\", nm:\"攻击×2\",    cost:2, req:[\"root\"], col:0, eff:m=>m.dmgMult*=2},\n  {id:\"a2\", nm:\"攻击速度×2\", cost:3, req:[\"a1\"], col:0, eff:m=>m.ballSpeed*=1.35},\n  {id:\"a3\", nm:\"血量+2\",     cost:3, req:[\"a2\"], col:0, eff:m=>m.hearts+=2},\n  {id:\"a4\", nm:\"攻击数量×2\", cost:4, req:[\"a3\"], col:0, eff:m=>m.startBalls=2},\n  // 分数列 (col1)\n  {id:\"b1\", nm:\"分数×2\",     cost:2, req:[\"root\"], col:1, eff:m=>m.scoreMult*=2},\n  {id:\"b2\", nm:\"速度-50%\",   cost:3, req:[\"b1\"], col:1, eff:m=>m.ballSpeed*=0.6},\n  {id:\"b3\", nm:\"满1000+1点\", cost:3, req:[\"b2\"], col:1, eff:m=>m.tpAt1000=true},\n  {id:\"b4\", nm:\"小球大小×2\", cost:4, req:[\"b3\"], col:1, eff:m=>m.ballSize*=1.7},\n  // 价格/Boss列 (col2)\n  {id:\"c1\", nm:\"价格-20%\",       cost:2, req:[\"root\"], col:2, eff:m=>m.priceMult*=0.8},\n  {id:\"c2\", nm:\"小球特殊概率×2\", cost:3, req:[\"c1\"], col:2, eff:m=>m.specialMult*=2},\n  {id:\"c3\", nm:\"Boss概率×3\",     cost:3, req:[\"c2\"], col:2, eff:m=>m.bossMult*=3},\n  {id:\"c4\", nm:\"Boss攻击-50%\",   cost:4, req:[\"c3\"], col:2, eff:m=>m.bossAtkMult*=0.5},\n  // 终极\n  {id:\"rainbow\", nm:\"🌈彩虹小球\", cost:10, req:[\"a4\",\"b4\",\"c4\"], col:1, ult:true,\n   eff:m=>{m.rainbow=true;}},\n];\nconst talById=id=>TAL.find(t=>t.id===id);\nconst hasTal=id=>SAVE.talents.includes(id);\nfunction talAvail(t){\n  if(hasTal(t.id)) return false;\n  if(t.ult) return t.req.every(r=>hasTal(r)) && SAVE.tp>=t.cost;\n  return (t.req.length===0||t.req.every(r=>hasTal(r))) && SAVE.tp>=t.cost;\n}\n\n/*---------------- 道具商店 ----------------*/\nconst SHOP=[\n  {id:\"dur\",    nm:\"效果时间×2\",        price:250,  perm:false, sub:\"Buff持续时间翻倍\"},\n  {id:\"slow\",   nm:\"小球减速20%\",       price:100,  perm:false, sub:\"更好控制\"},\n  {id:\"spec\",   nm:\"特殊砖块发生率×2\",  price:800,  perm:false, sub:\"更多特殊砖块\"},\n  {id:\"cheap\",  nm:\"商店价格-30%(永久)\", price:1500, perm:true,  sub:\"永久生效\"},\n  {id:\"maxhp\",  nm:\"血量上限+1(永久)\",   price:1200, perm:true,  sub:\"永久+1颗心\"},\n  {id:\"big\",    nm:\"小球大小×1.5\",      price:800,  perm:false, sub:\"更大更好接\"},\n  {id:\"bossdmg\",nm:\"对Boss伤害×3\",      price:500,  perm:false, sub:\"速杀Boss\"},\n  {id:\"sin1\",   nm:\"罪恶置换1\",          price:0,    perm:false, sub:\"立刻+1000💰，但3局内小球变小\", instant:1000},\n  {id:\"sin2\",   nm:\"罪恶置换2\",          price:0,    perm:false, sub:\"立刻+2000💰，但3局内平台变短\", instant:2000},\n];\nfunction shopPrice(it){\n  let p=it.price;\n  let mult=1;\n  if(SAVE.shopPerm.cheap) mult*=0.7;\n  // 天赋价格-20%\n  if(hasTal(\"c1\")) mult*=0.8;\n  return Math.round(p*mult);\n}\n\n/*---------------- 外挂 ----------------*/\nconst CHEAT={coins:false,hp:false,atk:false,talent:false};\nconst cheatOn=()=>CHEAT.coins||CHEAT.hp||CHEAT.atk||CHEAT.talent;\n\n/*---------------- Buff 定义 ----------------*/\nconst BUFFS={\n  speed :{nm:\"加速\",    dur:25, ico:\"⚡\"},\n  paddle:{nm:\"平台变长\", dur:20, ico:\"⬌\"},\n  aim   :{nm:\"精准\",    dur:15, ico:\"🎯\"},\n  slow  :{nm:\"缓降\",    dur:20, ico:\"🪶\"},\n  small :{nm:\"小平台\",  dur:0,  ico:\"▬\", once:true},\n  big   :{nm:\"小球变大\", dur:10, ico:\"⬤\"},\n  laser :{nm:\"激光平台\", dur:15, ico:\"📏\"},\n  boom  :{nm:\"爆炸球\",  dur:20, ico:\"💣\"},\n  coin  :{nm:\"金币球\",  dur:9999,ico:\"🪙\"},\n};\nconst BUFF_KEYS=Object.keys(BUFFS);\n\n/*========================================================================\n  游戏状态\n========================================================================*/\nlet gs=null, MOD=null, diffName=\"\", scoreCounts=true;\n\nfunction computeMod(diff){\n  const m={dmgMult:1,ballSpeed:1,hearts:3,startBalls:1,scoreMult:1,priceMult:1,\n    specialMult:1,bossMult:1,bossAtkMult:1,ballSize:1,tpAt1000:false,rainbow:false,\n    coinMult:1,bossDmgMult:1,buffDur:1,paddleMult:1,noBoss:false,brickEffMult:1,bossChanceAdd:0};\n  // 天赋\n  const tals = CHEAT.talent ? TAL.map(t=>t.id) : SAVE.talents;\n  for(const id of tals){ const t=talById(id); if(t) t.eff(m); }\n  // 商店永久\n  if(SAVE.shopPerm.maxhp) m.hearts+=1;\n  // 商店临时（本局有效）\n  const T=SAVE.shopTemp;\n  if(T.dur>0)  m.buffDur*=2;\n  if(T.slow>0) m.ballSpeed*=0.8;\n  if(T.spec>0) m.specialMult*=2;\n  if(T.big>0)  m.ballSize*=1.5;\n  if(T.bossdmg>0) m.bossDmgMult*=3;\n  if(T.sin1>0) m.ballSize*=0.6;\n  if(T.sin2>0) m.paddleMult*=0.7;\n  // 难度\n  if(diff===\"novice\"){ m.noBoss=true; m.brickEffMult=2; m.hearts*=3; scoreCounts=false; }\n  else if(diff===\"veteran\"){ m.bossChanceAdd=0.05; m.hearts=Math.max(1,m.hearts-2); m.coinMult*=1.5; m.scoreMult*=1.2; }\n  else scoreCounts=true;\n  if(cheatOn()) scoreCounts=false;\n  return m;\n}\n\nfunction newGame(diff){\n  diffName=diff;\n  MOD=computeMod(diff);\n  gs={\n    running:true, paused:false, over:false,\n    score:0, coins:0, hearts:Math.round(MOD.hearts), maxHearts:Math.round(MOD.hearts),\n    wave:0, heartProg:0, tpAwarded:false,\n    paddle:{x:W/2, y:H-40, w:100*MOD.paddleMult, h:14},\n    smallPaddle:null,\n    balls:[], items:[], lasers:[], shards:[], particles:[], projectiles:[],\n    chunks:[], rings:[], deathFreeze:0,       // Boss 死亡解体动画\n    bricks:[], buffs:{}, coinBall:false,\n    launched:false,\n    boss:null, nextBoss:10000, ballDmgAcc:0,  // Boss 仅在 10000 分触发\n    ballGrow:1,                               // 残局小球渐大系数\n    clogUntil:0, muted:false,\n    unlockedBallColors:1, // 小球砖块解锁多球\n  };\n  // 初始球（放在平台上）\n  const nb=MOD.startBalls||1;\n  for(let i=0;i<nb;i++) spawnBall(true);\n  buildWave();\n  syncHud();\n}\n\nfunction spawnBall(onPaddle, type, color){\n  const r=10*MOD.ballSize;                                   // 小球变大\n  const b={x:gs?gs.paddle.x:W/2, y:H-40-14, vx:0, vy:0, r, speed:360*MOD.ballSpeed,\n    stuck:onPaddle, type:type||\"normal\", color:color||\"#ffffff\"};\n  if(!onPaddle){ const a=-Math.PI/2+rand(-0.5,0.5); b.vx=Math.cos(a)*b.speed; b.vy=Math.sin(a)*b.speed; }\n  gs.balls.push(b);\n  return b;\n}\n\n/*---------------- 波次/砖块生成 ----------------*/\nfunction pickType(waveCfg){\n  // 普通概率\n  let specialChance=Math.min(0.85, 0.30*MOD.specialMult*waveCfg.specialBias);\n  if(Math.random()>specialChance) return \"normal\";\n  // 加权选特殊\n  const pool=[];\n  for(const k in BT){ if(k===\"normal\") continue;\n    if(k===\"boss\") continue;                    // 老板砖已移除：Boss 只在 10000 分触发\n    let w=BT[k].w;\n    if(k===\"thick\"&&waveCfg.thickBoost) w*=2.2;\n    if(k===\"invis\"&&waveCfg.thickBoost) w*=1.8;\n    if(k===\"special\"&&!waveCfg.special) w*=0.15;\n    pool.push([k,w]);\n  }\n  let tot=pool.reduce((s,p)=>s+p[1],0), roll=Math.random()*tot;\n  for(const [k,w] of pool){ roll-=w; if(roll<=0) return k; }\n  return \"func\";\n}\n\nfunction buildWave(){\n  gs.wave++;\n  gs.ballGrow=1;                       // 新一波：小球复原\n  const wv=gs.wave;\n  const cfg={specialBias:1, boss:true, special:false, thickBoost:false};\n  if(wv<=3){ cfg.specialBias=1; }\n  if(wv===4){ cfg.special=true; }            // 特殊瞄准波：底排水缸/太空\n  if(wv>=5){ cfg.thickBoost=true; }          // Boss前置波：厚砖/隐形增多\n  const rows=Math.min(4+Math.floor((wv-1)/2),6);\n  gs.bricks=[];\n  // 更紧凑的地图：砖块收进 playfield 内，居中留边\n  const gap=5, pad=8, avail=(PF.R-PF.L)-pad*2;\n  const bw=(avail-(COLS-1)*gap)/COLS, bh=17, top=PF.top+8, rgap=7;   // 砖块更短\n  const x0=PF.L+pad;\n  for(let r=0;r<rows;r++){\n    for(let c=0;c<COLS;c++){\n      // 第4波：仅底排放特殊，其余普通/少量\n      let type;\n      if(wv===4 && r===rows-1){ type=(Math.random()<0.4)?\"special\":\"normal\"; }\n      else type=pickType(cfg);\n      // 少量空格增加趣味（约8%空）\n      if(Math.random()<0.08 && type===\"normal\"){ continue; }\n      const def=BT[type];\n      gs.bricks.push({\n        x:x0+c*(bw+gap), y:top+r*(bh+rgap), w:bw, h:bh,\n        type, hp:def.hp||1, maxhp:def.hp||1, color:ROWCOL[r%4],\n        revealed:!def.invis, score:def.score, alive:true,\n      });\n    }\n  }\n  // 保底：若整波空了，补一排普通\n  if(gs.bricks.length===0) buildWave();\n}\n\n/*========================================================================\n  更新逻辑（不含 canvas）\n========================================================================*/\nfunction update(dt){\n  if(!gs||!gs.running||gs.paused||gs.over) return;\n  gs.t=(gs.t||0)+dt;\n\n  // Buff 计时\n  for(const k in gs.buffs){ if(gs.buffs[k]!==Infinity){ gs.buffs[k]-=dt; if(gs.buffs[k]<=0) delete gs.buffs[k]; } }\n\n  // 平台跟随（由输入设置 targetX）\n  const pad=gs.paddle;\n  pad.w=(gs.buffs.paddle?150:100)*MOD.paddleMult;\n  if(gs.targetX!=null) pad.x=clamp(gs.targetX,PF.L+pad.w/2,PF.R-pad.w/2);\n\n  // 彩虹：每20秒随机Buff\n  if(MOD.rainbow){ gs.rbTimer=(gs.rbTimer||0)+dt; if(gs.rbTimer>=20){ gs.rbTimer=0; grantBuff(BUFF_KEYS[Math.floor(Math.random()*BUFF_KEYS.length)]); } }\n\n  // 激光平台：定期发射\n  if(gs.buffs.laser){ gs.laserT=(gs.laserT||0)+dt; if(gs.laserT>=0.5){ gs.laserT=0;\n    gs.lasers.push({x:pad.x-pad.w*0.35,y:pad.y}); gs.lasers.push({x:pad.x+pad.w*0.35,y:pad.y}); } }\n  for(const l of gs.lasers){ l.y-=600*dt; }\n\n  updateBalls(dt);\n  updateItems(dt);\n  updateLasers(dt);\n  updateShards(dt);\n  if(gs.boss) updateBoss(dt);\n  for(const p of gs.particles){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt; }\n  gs.particles=gs.particles.filter(p=>p.life>0);\n  // Boss 解体碎片 + 爆炸环\n  for(const c of gs.chunks){ if(c.delay>0){ c.delay-=dt; continue; } c.life-=dt; c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=520*dt; c.vx*=0.99; }\n  gs.chunks=gs.chunks.filter(c=>c.life>0);\n  for(const r of gs.rings){ if(r.delay>0){ r.delay-=dt; continue; } r.life-=dt; r.r+=(r.max-r.r)*Math.min(1,dt*6); }\n  gs.rings=gs.rings.filter(r=>r.life>0);\n  if(gs.flashScreen>0) gs.flashScreen-=dt;\n  if(gs.deathFreeze>0) gs.deathFreeze-=dt;\n\n  // 满1000送天赋点（天赋b3）\n  if(MOD.tpAt1000 && !gs.tpAwarded && gs.score>=1000){ gs.tpAwarded=true; if(!cheatOn()){ SAVE.tp++; save(); } toast(\"🌳 达成1000分 +1天赋点\"); }\n\n  // Boss 触发\n  if(!gs.boss && !MOD.noBoss && gs.score>=gs.nextBoss){ triggerBoss(); }\n\n  // 残局小球渐大：剩余砖块 < 4 时慢慢变大（下一波在 buildWave 里复原）\n  if(!gs.boss){\n    const left=gs.bricks.filter(b=>b.alive).length;\n    const target = left<4 ? 1 + (4-left)*0.32 : 1;   // 3块→1.32 … 0块→2.28\n    const rate = (target>gs.ballGrow?0.6:2.5);        // 变大慢、复原快\n    gs.ballGrow += (target-gs.ballGrow)*Math.min(1,dt*rate);\n  }\n\n  // 清波判定（Boss 解体动画期间不刷新）\n  if(!gs.boss && gs.deathFreeze<=0 && gs.bricks.filter(b=>b.alive).length===0){ buildWave(); }\n\n  syncHud();\n}\n\nfunction updateBalls(dt){\n  const pad=gs.paddle;\n  for(const ball of gs.balls){\n    if(ball.stuck){ ball.x=pad.x; ball.y=pad.y-pad.h/2-ball.r-2; continue; }\n    ball.r=(gs.buffs.big?14:10)*MOD.ballSize*(gs.boss?(gs.ballScale||1):(gs.ballGrow||1));\n    const hollow = ball.type===\"hollow\";\n    let sp=ball.speed*(gs.buffs.speed?1.6:1)*(gs.buffs.slow?0.6:1);\n    // 跟踪球：始终强力追踪最近砖块（无砖时追Boss）；精准Buff：轻微偏转\n    const homing = ball.type===\"tracking\";\n    if(homing||gs.buffs.aim){\n      let tx,ty; const tb=nearestBrick(ball);\n      if(tb){ tx=tb.x+tb.w/2; ty=tb.y+tb.h/2; }\n      else if(gs.boss){ tx=gs.boss.x+gs.boss.w/2; ty=gs.boss.y+gs.boss.h/2; }\n      if(tx!=null){ const ang=Math.atan2(ty-ball.y,tx-ball.x);\n        const cur=Math.atan2(ball.vy,ball.vx); const turn=homing?3.2:0.6;\n        const na=cur+clamp(((ang-cur+Math.PI*3)%(Math.PI*2))-Math.PI,-turn*dt,turn*dt);\n        ball.vx=Math.cos(na); ball.vy=Math.sin(na); } }\n    // 归一化方向\n    const mag=Math.hypot(ball.vx,ball.vy)||1; ball.vx/=mag; ball.vy/=mag;\n    const move=sp*dt; const steps=Math.max(1,Math.ceil(move/(ball.r*0.8)));\n    const stepLen=move/steps;\n    for(let s=0;s<steps;s++){\n      ball.x+=ball.vx*stepLen; ball.y+=ball.vy*stepLen;\n      if(hollow){\n        // 空心球：穿墙 + 底部环绕，不会被消除\n        if(ball.x<PF.L-ball.r) ball.x=PF.R+ball.r-1;\n        else if(ball.x>PF.R+ball.r) ball.x=PF.L-ball.r+1;\n        if(ball.y<PF.top-ball.r) ball.y=H+ball.r-1;\n        else if(ball.y>H+ball.r) ball.y=PF.top-ball.r+1;\n      } else {\n        // 墙壁反弹\n        if(ball.x-ball.r<PF.L){ ball.x=PF.L+ball.r; ball.vx=Math.abs(ball.vx); }\n        if(ball.x+ball.r>PF.R){ ball.x=PF.R-ball.r; ball.vx=-Math.abs(ball.vx); }\n        if(ball.y-ball.r<PF.top){ ball.y=PF.top+ball.r; ball.vy=Math.abs(ball.vy); }\n      }\n      // 平台\n      if(collidePaddle(ball,pad)) { onPaddleHit(ball,pad); }\n      if(gs.smallPaddle && collidePaddle(ball,gs.smallPaddle)){ onPaddleHit(ball,gs.smallPaddle); gs.smallPaddle=null; }\n      // Boss\n      if(gs.boss && circleRect(ball,gs.boss)){ hitBoss(ball); break; }\n      // 砖块\n      const hit=brickCollide(ball);\n      if(hit) break;\n    }\n    // 掉落（空心球不消除）\n    if(!hollow && ball.y-ball.r>H+20) ball.dead=true;\n  }\n  // 移除死球\n  const before=gs.balls.length;\n  gs.balls=gs.balls.filter(b=>!b.dead);\n  if(gs.balls.length===0 && before>0){ loseHeart(); }\n  // 保证始终有球\n  if(gs.balls.length===0 && !gs.over){ const b=spawnBall(true); }\n}\n\nfunction collidePaddle(ball,pad){\n  if(ball.vy<=0) return false;\n  return ball.x>pad.x-pad.w/2-ball.r && ball.x<pad.x+pad.w/2+ball.r &&\n         ball.y+ball.r>pad.y-pad.h/2 && ball.y-ball.r<pad.y+pad.h/2;\n}\nfunction onPaddleHit(ball,pad){\n  if(Date.now()<gs.clogUntil){ /* 平台堵塞：接球判定缩小50% */\n    if(Math.abs(ball.x-pad.x)>pad.w*0.25) return;\n  }\n  ball.y=pad.y-pad.h/2-ball.r-0.5;\n  const rel=clamp((ball.x-pad.x)/(pad.w/2),-1,1);\n  const ang=-Math.PI/2 + rel*(Math.PI*0.42);\n  ball.vx=Math.cos(ang); ball.vy=Math.sin(ang);\n  // Boss战：碰平台恢复球体积8%\n  if(gs.boss){ gs.ballScale=Math.min(1,(gs.ballScale||1)+0.08); }\n  // 激光：碰平台一次后失效\n  if(gs.buffs.laser) delete gs.buffs.laser;\n  spawnParticles(ball.x,pad.y-6,\"#ffffff\",4);\n}\n\nfunction nearestBrick(ball){\n  let best=null,bd=1e9;\n  for(const b of gs.bricks){ if(!b.alive) continue; const dx=b.x+b.w/2-ball.x, dy=b.y+b.h/2-ball.y, d=dx*dx+dy*dy;\n    if(d<bd){bd=d;best=b;} }\n  return best;\n}\n\nfunction circleRect(c,r){\n  const cx=clamp(c.x,r.x,r.x+r.w), cy=clamp(c.y,r.y,r.y+r.h);\n  return (c.x-cx)**2+(c.y-cy)**2 < c.r*c.r;\n}\nfunction brickCollide(ball){\n  for(const b of gs.bricks){\n    if(!b.alive) continue;\n    if(!circleRect(ball,b)) continue;\n    // 反弹方向：比较穿透\n    const cx=clamp(ball.x,b.x,b.x+b.w), cy=clamp(ball.y,b.y,b.y+b.h);\n    const dx=ball.x-cx, dy=ball.y-cy;\n    if(Math.abs(dx)>Math.abs(dy)) ball.vx=dx>=0?Math.abs(ball.vx):-Math.abs(ball.vx);\n    else ball.vy=dy>=0?Math.abs(ball.vy):-Math.abs(ball.vy);\n    // 推离\n    ball.x+=ball.vx*ball.r*0.5; ball.y+=ball.vy*ball.r*0.5;\n    damageBrick(b,ball);\n    return true;\n  }\n  return false;\n}\n\nfunction damageBrick(b,ball){\n  // 隐形：先显形\n  if(b.type===\"invis\" && !b.revealed){ b.revealed=true; spawnParticles(b.x+b.w/2,b.y+b.h/2,\"#e6c02e\",6); return; }\n  let dmg=CHEAT.atk?999:1;\n  b.hp-=dmg;\n  spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color,6);\n  if(gs.buffs.boom){ explode(b.x+b.w/2,b.y+b.h/2,60); }\n  if(gs.coinBall) addCoins(2);\n  if(b.hp>0) return;              // 厚砖块还没破\n  breakBrick(b);\n}\n\nfunction breakBrick(b){\n  b.alive=false;\n  const def=BT[b.type];\n  addScore((def.score||50)*MOD.brickEffMult);\n  shatterBrick(b);                                   // 所有砖块：像素碎裂\n  switch(b.type){\n    case \"func\":  dropItem(b,\"plus\"); break;\n    case \"heart\": dropItem(b,\"heart\",b.color); break; // 掉落对应颜色血量\n    case \"ball\":  addBallFromBrick(b); break;          // 掉落对应颜色/类型小球\n    case \"coin\":  dropItem(b,\"coin\"); break;\n    case \"special\": dropItem(b,\"shard\"); break;\n    case \"tnt\":   explode(b.x+b.w/2,b.y+b.h/2,80); gs.shake=0.2; break;\n  }\n}\n// 像素碎裂：小方块四散\nfunction shatterBrick(b){\n  const n=7+Math.floor(Math.random()*4), cx=b.x+b.w/2, cy=b.y+b.h/2;\n  const pal=[b.color, shade(b.color,45), shade(b.color,-40), \"#ffffff\"];\n  for(let i=0;i<n;i++){\n    gs.chunks.push({ x:cx+rand(-b.w*0.4,b.w*0.4), y:cy+rand(-b.h*0.4,b.h*0.4),\n      vx:rand(-130,130), vy:rand(-190,-40), size:rand(3,6),\n      col:pal[Math.floor(Math.random()*pal.length)], life:rand(0.32,0.6), max:0.6, delay:0 });\n  }\n}\n// 小球砖块 → 按颜色给对应特殊球（蓝=空心球 红=跟踪球 黄/绿=普通彩色球）\nconst BALLTYPE_BY_COLOR={ \"#3b6fd4\":\"hollow\", \"#d8433a\":\"tracking\", \"#e6c02e\":\"normal\", \"#2f9e44\":\"normal\" };\nfunction addBallFromBrick(b){\n  if(gs.balls.length>=7) return;\n  const type=BALLTYPE_BY_COLOR[b.color]||\"normal\";\n  const nb=spawnBall(false, type, b.color);\n  nb.x=b.x+b.w/2; nb.y=b.y+b.h/2;\n  const a=rand(-Math.PI*0.75,-Math.PI*0.25); nb.vx=Math.cos(a); nb.vy=Math.sin(a);\n  const nm={hollow:\"空心球（穿墙·不掉落）\",tracking:\"跟踪球（自动追击）\",normal:\"小球\"}[type];\n  toast(\"◔ 获得\"+nm);\n}\n\nfunction explode(x,y,radius){\n  spawnParticles(x,y,\"#ff9a3c\",16);\n  for(const o of gs.bricks){ if(!o.alive) continue;\n    const ox=o.x+o.w/2, oy=o.y+o.h/2;\n    if((ox-x)**2+(oy-y)**2 < radius*radius){ o.hp-=1; if(o.hp<=0) breakBrick(o); }\n  }\n  if(gs.boss){ const bx=gs.boss.x+gs.boss.w/2, by=gs.boss.y+gs.boss.h/2;\n    if((bx-x)**2+(by-y)**2<radius*radius) dealBossDamage(30); }\n}\n\n/*---------------- 掉落物 ----------------*/\nfunction dropItem(b,kind,color){\n  gs.items.push({x:b.x+b.w/2, y:b.y+b.h/2, vy:150, kind, color:color||null});\n}\nconst COLOR_NAME={ \"#3b6fd4\":\"蓝\", \"#d8433a\":\"红\", \"#e6c02e\":\"黄\", \"#2f9e44\":\"绿\" };\nfunction updateItems(dt){\n  const pad=gs.paddle;\n  for(const it of gs.items){\n    it.y+=it.vy*dt;\n    if(it.y>pad.y-10 && Math.abs(it.x-pad.x)<pad.w/2+10 && it.y<pad.y+20){ catchItem(it); it.dead=true; }\n    if(it.y>H+20) it.dead=true;\n  }\n  gs.items=gs.items.filter(i=>!i.dead);\n}\nfunction catchItem(it){\n  if(it.kind===\"plus\"){ addScore(0); grantBuff(BUFF_KEYS[Math.floor(Math.random()*BUFF_KEYS.length)]); }\n  else if(it.kind===\"heart\"){ const c=it.color||\"#ff4b6e\", nm=COLOR_NAME[c]||\"\";\n    gs.heartProgC=gs.heartProgC||{}; gs.heartProgC[c]=(gs.heartProgC[c]||0)+1; const p=gs.heartProgC[c];\n    toast(`❤ ${nm}血量 ${p}/4`);\n    if(p>=4){ gs.heartProgC[c]=0; if(gs.hearts<gs.maxHearts){ gs.hearts++; toast(`❤ ${nm}血量 +1！`); } } }\n  else if(it.kind===\"coin\"){ const c=Math.round(rand(50,150)); addCoins(c); toast(\"💰 +\"+c); }\n  else if(it.kind===\"shard\"){ /* 碎片：错误接到→平台堵塞50%持续3秒 */ gs.clogUntil=Date.now()+3000; toast(\"⚠ 碎片！平台堵塞3秒\"); spawnParticles(it.x,it.y,\"#3b6fd4\",8); }\n}\nfunction grantBuff(key){\n  const def=BUFFS[key];\n  if(key===\"small\"){ gs.smallPaddle={x:gs.paddle.x, y:gs.paddle.y+40, w:70, h:10}; toast(\"▬ 额外小平台\"); return; }\n  if(key===\"coin\"){ gs.coinBall=true; toast(\"🪙 金币球（本局永久）\"); return; }\n  gs.buffs[key]=def.dur*MOD.buffDur;\n  toast(def.ico+\" \"+def.nm);\n}\n\n/*---------------- 激光/碎片 ----------------*/\nfunction updateLasers(dt){\n  for(const l of gs.lasers){\n    for(const b of gs.bricks){ if(!b.alive) continue;\n      if(l.x>b.x && l.x<b.x+b.w && l.y>b.y && l.y<b.y+b.h){ b.hp-=1; if(b.hp<=0) breakBrick(b); l.dead=true; break; } }\n    if(l.y<TOP) l.dead=true;\n  }\n  gs.lasers=gs.lasers.filter(l=>!l.dead);\n}\nfunction updateShards(dt){ /* 预留：碎片作为掉落物已在 items 处理 */ }\n\n/*---------------- Boss 机敏 ----------------*/\nfunction triggerBoss(){\n  if(gs.boss||MOD.noBoss) return;\n  gs.bricks=[]; gs.items=[]; gs.lasers=[];\n  const bw=306, bh=190;                             // 更大、更精致的像素Boss\n  const hp=Math.max(1500, Math.round(gs.score*2.2)) ;\n  gs.boss={x:W/2-bw/2, y:TOP+44, w:bw, h:bh, hp, maxhp:hp, dispHp:hp, flash:0, hurtT:0, dir:1, atkT:0, face:\"😠\"};\n  gs.ballScale=1; gs.ballDmgAcc=0;\n  toast(\"⚠ Boss战【机敏】开始！\");\n  gs.shake=0.4;\n}\nfunction updateBoss(dt){\n  const bs=gs.boss;\n  if(bs.flash>0) bs.flash-=dt;\n  if(bs.hurtT>0) bs.hurtT-=dt;\n  // 血条平滑追赶（掉血拖尾动画）\n  if(bs.dispHp>bs.hp) bs.dispHp=Math.max(bs.hp, bs.dispHp-(bs.maxhp*0.9)*dt);\n  else bs.dispHp=bs.hp;\n  bs.x+=bs.dir*90*dt*(1+ (1-bs.hp/bs.maxhp)); // 血越少越快\n  if(bs.x<PF.L){bs.x=PF.L;bs.dir=1;} if(bs.x+bs.w>PF.R){bs.x=PF.R-bs.w;bs.dir=-1;}\n  // 攻击：投射物\n  bs.atkT-=dt;\n  if(bs.atkT<=0){ bs.atkT=1.4;\n    if(Math.random()>MOD.bossAtkMult*0.5) { /* Boss攻击-50%可能不攻击 */ }\n    gs.projectiles.push({x:bs.x+bs.w/2, y:bs.y+bs.h, vy:260, r:9}); }\n  for(const p of gs.projectiles){ p.y+=p.vy*dt;\n    const pad=gs.paddle;\n    if(p.y>pad.y-8 && Math.abs(p.x-pad.x)<pad.w/2 && p.y<pad.y+16){ p.dead=true; loseHeart(); gs.shake=0.25; }\n    if(p.y>H+20) p.dead=true;\n  }\n  gs.projectiles=gs.projectiles.filter(p=>!p.dead);\n}\nfunction hitBoss(ball){\n  // 反弹\n  const bx=gs.boss.x+gs.boss.w/2;\n  if(ball.y<gs.boss.y+gs.boss.h*0.5){ ball.vy=-Math.abs(ball.vy); ball.y=gs.boss.y-ball.r; }\n  else { ball.vx = ball.x<bx? -Math.abs(ball.vx):Math.abs(ball.vx); }\n  let dmg=50*MOD.dmgMult*MOD.bossDmgMult*(gs.buffs.big?1.2:1);\n  if(MOD.rainbow) dmg*=10;\n  if(CHEAT.atk) dmg=99999;\n  dealBossDamage(dmg);\n  spawnParticles(ball.x,ball.y,\"#ff5c5c\",8);\n}\nfunction dealBossDamage(dmg){\n  const bs=gs.boss; if(!bs) return;\n  bs.hp-=dmg; gs.ballDmgAcc+=dmg;\n  bs.flash=0.14; bs.hurtT=0.25; gs.shake=Math.max(gs.shake||0,0.12); // 受击闪白+抖动\n  // 累计1000伤害，球-10%\n  while(gs.ballDmgAcc>=1000){ gs.ballDmgAcc-=1000; gs.ballScale=Math.max(0.3,(gs.ballScale||1)-0.1); }\n  if(bs.hp<=0) killBoss();\n}\nfunction killBoss(){\n  const b=gs.boss;\n  // 像素解体：把 Boss 切成方块碎片向外炸开\n  const step=16, cx=b.x+b.w/2, cy=b.y+b.h/2;\n  const pal=[\"#d0392b\",\"#a02a20\",\"#ff6a5a\",\"#ffce3a\",\"#ffffff\",\"#7a1e2a\"];\n  for(let y=b.y;y<b.y+b.h;y+=step) for(let x=b.x;x<b.x+b.w;x+=step){\n    const dx=x+step/2-cx, dy=y+step/2-cy, d=Math.hypot(dx,dy)||1;\n    const sp=rand(90,300);\n    gs.chunks.push({x,y, vx:dx/d*sp+rand(-40,40), vy:dy/d*sp-rand(60,180),\n      size:step-2, col:pal[Math.floor(Math.random()*pal.length)],\n      life:rand(0.7,1.2), max:1.2, delay:rand(0,0.25)});\n  }\n  // 连环爆炸环\n  for(let i=0;i<5;i++) gs.rings.push({x:cx+rand(-b.w*0.3,b.w*0.3), y:cy+rand(-b.h*0.3,b.h*0.3),\n    r:6, max:rand(70,140), life:rand(0.4,0.7)+i*0.06, delay:i*0.09});\n  gs.flashScreen=0.18; gs.shake=0.6;\n  // 奖励\n  addScore(500); addCoins(500);\n  if(!cheatOn()){ SAVE.tp+=1; save(); }\n  gs.boss=null; gs.projectiles=[]; gs.ballScale=1;\n  gs.nextBoss+=2000;\n  gs.deathFreeze=1.1;                 // 解体动画期间不立刻刷新波次\n  toast(`🏆 击杀Boss！+500分 +500💰 +1天赋点`);\n}\n\n/*---------------- 分数/金币/血量 ----------------*/\nfunction addScore(v){ gs.score+=Math.round(v*MOD.scoreMult); }\nfunction addCoins(v){ gs.coins+=Math.round(v*MOD.coinMult); }\nfunction loseHeart(){\n  if(CHEAT.hp){ if(gs.balls.length===0) spawnBall(true); return; }\n  gs.hearts--;\n  spawnParticles(gs.paddle.x,gs.paddle.y,\"#ff3b5c\",14);\n  if(gs.hearts<=0){ gameOver(); }\n  else { gs.balls=[]; spawnBall(true); gs.launched=false; }\n}\n\nfunction spawnParticles(x,y,col,n){\n  for(let i=0;i<n;i++){ const a=rand(0,7),s=rand(40,160);\n    gs.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,r:rand(1.5,3.5),col,life:0.5,max:0.5}); }\n}\n\n/*========================================================================\n  游戏结束 & 排行榜\n========================================================================*/\nfunction gameOver(){\n  gs.over=true; gs.running=false;\n  // 金币入账\n  SAVE.coins+=gs.coins;\n  // 商店临时道具 -1 局\n  for(const k in SAVE.shopTemp){ if(SAVE.shopTemp[k]>0){ SAVE.shopTemp[k]--; if(SAVE.shopTemp[k]<=0) delete SAVE.shopTemp[k]; } }\n  let onBoard=false, brokeRecord=false;\n  if(scoreCounts && gs.score>0){\n    if(gs.score>SAVE.high){ SAVE.high=gs.score; brokeRecord=true; }\n    // 上榜判定（前5或分数>0且榜未满/超过末位）\n    const board=SAVE.board;\n    if(board.length<5 || gs.score>board[board.length-1].score){ onBoard=true; }\n  }\n  // 连续3局未破纪录（非酋奖）计数\n  if(scoreCounts){ if(brokeRecord) SAVE.noRecord=0; else SAVE.noRecord++; }\n  save();\n  showOver(onBoard,brokeRecord);\n}\nfunction showOver(onBoard,brokeRecord){\n  document.getElementById(\"hudCtl\").style.display=\"none\";\n  const ov=document.getElementById(\"overScreen\");\n  document.getElementById(\"overTitle\").textContent = gs.score>0?(brokeRecord?\"🎉 新纪录！\":\"游戏结束\"):\"游戏结束\";\n  document.getElementById(\"overStats\").innerHTML=\n    `得分 <b>${gs.score}</b> · 到达第 <b>${gs.wave}</b> 波 · 获得 💰<b>${gs.coins}</b>`\n    + (scoreCounts?\"\":\" · <span style='color:#ff5c72'>（本局不计分）</span>\");\n  document.getElementById(\"overNameBox\").style.display=onBoard?\"flex\":\"none\";\n  ov._onBoard=onBoard;\n  showScreen(\"overScreen\");\n}\nfunction saveScoreToBoard(){\n  const nm=(document.getElementById(\"nameInput\").value||\"玩家\").slice(0,8);\n  SAVE.board.push({name:nm,score:gs.score});\n  SAVE.board.sort((a,b)=>b.score-a.score);\n  SAVE.board=SAVE.board.slice(0,5);\n  save();\n  document.getElementById(\"overNameBox\").style.display=\"none\";\n  toast(\"✅ 已保存到排行榜\");\n}\n\n/*========================================================================\n  渲染\n========================================================================*/\n/* ---- 像素工具 ---- */\nconst PX=3;                                   // 基础像素单位\nfunction pxRect(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }\n// 3x5 像素数字字模\nconst PXDIG={\n \"0\":[\"111\",\"101\",\"101\",\"101\",\"111\"],\"1\":[\"110\",\"010\",\"010\",\"010\",\"111\"],\n \"2\":[\"111\",\"001\",\"111\",\"100\",\"111\"],\"3\":[\"111\",\"001\",\"111\",\"001\",\"111\"],\n \"4\":[\"101\",\"101\",\"111\",\"001\",\"001\"],\"5\":[\"111\",\"100\",\"111\",\"001\",\"111\"],\n \"6\":[\"111\",\"100\",\"111\",\"101\",\"111\"],\"7\":[\"111\",\"001\",\"010\",\"010\",\"010\"],\n \"8\":[\"111\",\"101\",\"111\",\"101\",\"111\"],\"9\":[\"111\",\"101\",\"111\",\"001\",\"111\"],\n};\nfunction drawPixNum(str,cx,topY,s,col,shadow){\n  const dw=3*s, gap=s, total=str.length*dw+(str.length-1)*gap;\n  let x=cx-total/2;\n  for(const ch of str){ const g=PXDIG[ch]; if(g){\n    for(let r=0;r<5;r++)for(let c=0;c<3;c++) if(g[r][c]===\"1\"){\n      if(shadow) pxRect(x+c*s+s*0.4,topY+r*s+s*0.4,s,s,shadow);\n      pxRect(x+c*s,topY+r*s,s,s,col);\n    } }\n    x+=dw+gap;\n  }\n}\n/* 机台边框 + 凹陷屏幕（精致像素外壳） */\nfunction drawFrame(){\n  const L=PF.L, R=PF.R, T=PF.top, B=H;\n  // 凹陷屏幕：黑边 + 深色屏 + 内点阵\n  ctx.fillStyle=\"#000\"; ctx.fillRect(L-5,T-5,(R-L)+10,(B-T)+5);\n  ctx.fillStyle=\"#0b0b13\"; ctx.fillRect(L,T,(R-L),(B-T));\n  ctx.fillStyle=\"#14141e\";\n  for(let y=T;y<B;y+=12) for(let x=L+((Math.floor((y-T)/12)%2)*12);x<R;x+=24) ctx.fillRect(x,y,2,2);\n  // 屏幕内高光/阴影边\n  ctx.fillStyle=\"#20202e\"; ctx.fillRect(L,T,(R-L),2); ctx.fillStyle=\"#000\"; ctx.fillRect(L,T,2,(B-T)); ctx.fillRect(R-2,T,2,(B-T));\n  // 金属边框\n  const bez=\"#2c2c3c\",hi=\"#4a4a64\",sh=\"#111119\";\n  const bar=(x,y,w,h)=>{ pxRect(x,y,w,h,bez); pxRect(x,y,w,3,hi); pxRect(x,y,3,h,hi); pxRect(x,y+h-3,w,3,sh); pxRect(x+w-3,y,3,h,sh); };\n  bar(L-20,T-14,14,(B-T)+16);        // 左\n  bar(R+6,T-14,14,(B-T)+16);         // 右\n  bar(L-20,T-14,(R-L)+40,12);        // 顶\n  // 角铆钉\n  for(const [x,y] of [[L-13,T-7],[R+13,T-7],[L-13,B-6],[R+13,B-6]]){ pxRect(x-2,y-2,5,5,\"#5a5a78\"); pxRect(x-1,y-1,2,2,\"#8a8aa8\"); }\n  // 四角彩色 L 形点缀（蓝/红/黄/绿，呼应四排砖块）\n  const cc=[\"#3b6fd4\",\"#d8433a\",\"#e6c02e\",\"#2f9e44\"];\n  const IL=L-2, IR=R-1, IT=T-2, IB=B-4, len=16, th=4;\n  // 左上蓝\n  pxRect(IL,IT,len,th,cc[0]); pxRect(IL,IT,th,len,cc[0]); pxRect(IL,IT,th,th,shade(cc[0],70));\n  // 右上红\n  pxRect(IR-len,IT,len,th,cc[1]); pxRect(IR-th,IT,th,len,cc[1]); pxRect(IR-th,IT,th,th,shade(cc[1],70));\n  // 左下黄\n  pxRect(IL,IB-len,th,len,cc[2]); pxRect(IL,IB-th,len,th,cc[2]); pxRect(IL,IB-th,th,th,shade(cc[2],70));\n  // 右下绿\n  pxRect(IR-len,IB-th,len,th,cc[3]); pxRect(IR-th,IB-len,th,len,cc[3]); pxRect(IR-th,IB-th,th,th,shade(cc[3],70));\n}\nfunction render(){\n  ctx.setTransform(1,0,0,1,0,0);\n  ctx.imageSmoothingEnabled=false;\n  ctx.clearRect(0,0,W,H);\n  // 抖动\n  if(gs&&gs.shake>0){ const s=gs.shake*10; ctx.translate(Math.round(rand(-s,s)),Math.round(rand(-s,s))); gs.shake=Math.max(0,gs.shake-0.03); }\n  // 机台外壳（深色）\n  ctx.fillStyle=\"#191922\"; ctx.fillRect(-20,-20,W+40,H+40);\n  if(!gs){ // 菜单态也画个简单底\n    ctx.fillStyle=\"#0d0d14\"; ctx.fillRect(0,0,W,H); return; }\n  drawFrame();\n  // 顶部HUD\n  drawHud();\n  // 砖块\n  for(const b of gs.bricks){ if(!b.alive) continue; drawBrick(b); }\n  // Boss\n  if(gs.boss) drawBoss();\n  // 投射物\n  ctx.fillStyle=\"#c04cff\";\n  for(const p of gs.projectiles){ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }\n  // 掉落物\n  for(const it of gs.items) drawItem(it);\n  // 激光\n  ctx.strokeStyle=\"#ff4b6e\"; ctx.lineWidth=3;\n  for(const l of gs.lasers){ ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(l.x,l.y-14); ctx.stroke(); }\n  // 平台\n  drawPaddle(gs.paddle, Date.now()<gs.clogUntil);\n  if(gs.smallPaddle) drawPaddle(gs.smallPaddle,false);\n  // 球\n  for(const ball of gs.balls){ drawBall(ball); }\n  // 粒子\n  for(const p of gs.particles){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.col;\n    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }\n  ctx.globalAlpha=1;\n  // Boss 解体：爆炸环 + 像素碎片\n  for(const r of gs.rings){ if(r.delay>0) continue; ctx.globalAlpha=Math.max(0,r.life)*0.9;\n    ctx.strokeStyle=\"#ffce3a\"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke();\n    ctx.strokeStyle=\"#fff\"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r*0.7,0,7); ctx.stroke(); }\n  ctx.globalAlpha=1;\n  for(const c of gs.chunks){ if(c.delay>0) continue; ctx.globalAlpha=Math.max(0,Math.min(1,c.life*2));\n    pxRect(c.x,c.y,c.size,c.size,c.col); pxRect(c.x,c.y,c.size,1,\"rgba(255,255,255,.4)\"); }\n  ctx.globalAlpha=1;\n  // 屏幕闪光（Boss 爆炸瞬间）\n  if(gs.flashScreen>0){ ctx.fillStyle=`rgba(255,255,255,${Math.min(0.7,gs.flashScreen*3)})`; ctx.fillRect(PF.L,PF.top,PF.R-PF.L,H-PF.top); }\n  // 发射提示\n  if(gs.balls.some(b=>b.stuck) && !gs.over){ ctx.fillStyle=\"rgba(255,255,255,.8)\"; ctx.font=\"14px 'Courier New'\"; ctx.textAlign=\"center\";\n    ctx.fillText(\"点击 / 空格 发射小球\", W/2, H-70); }\n  if(gs.paused){ ctx.fillStyle=\"rgba(0,0,0,.6)\"; ctx.fillRect(0,0,W,H);\n    ctx.fillStyle=\"#fff\"; ctx.font=\"bold 30px 'Courier New'\"; ctx.textAlign=\"center\"; ctx.fillText(\"⏸ 暂停\", W/2,H/2); }\n}\nfunction drawHud(){\n  // HUD 底条\n  pxRect(0,0,W,TOP,\"#14141d\");\n  pxRect(0,TOP-3,W,3,\"#000\");\n  pxRect(0,TOP-6,W,3,\"#2a2a38\");\n  // 心（左，像素圆点 ●○）\n  for(let i=0;i<Math.min(gs.maxHearts,9);i++){\n    const cx=16+i*22, cy=22, on=i<gs.hearts;\n    pixCircle(cx,cy,7, on?\"#ffffff\":\"#3a3a48\");\n    if(on) pxRect(cx-3,cy-4,3,3,\"#c8d4ff\"); // 高光\n  }\n  // 分数（中）像素大数字\n  drawPixNum(String(gs.score).padStart(5,\"0\"), W/2, 8, 6, \"#ffffff\", \"#3a5aa0\");\n  // 金币 + 波（左下）\n  ctx.font=\"bold 13px 'Courier New'\"; ctx.textAlign=\"left\"; ctx.textBaseline=\"middle\";\n  ctx.fillStyle=\"#ffce3a\"; ctx.fillText(\"$\"+gs.coins, 12, 42);\n  ctx.fillStyle=\"#7ad0ff\"; ctx.fillText(\"WAVE \"+gs.wave, 92, 42);\n  // buff 图标（右下）\n  let bx=W-140; ctx.textAlign=\"left\";\n  for(const k in gs.buffs){ ctx.fillStyle=\"#9fd6ff\"; ctx.fillText(BUFFS[k].ico, bx, 42); bx+=18; }\n  if(gs.coinBall){ ctx.fillStyle=\"#ffce3a\"; ctx.fillText(\"🪙\",bx,42); }\n  ctx.textBaseline=\"alphabetic\";\n}\nfunction pixCircle(cx,cy,r,col){ // 像素风“圆”\n  ctx.fillStyle=col;\n  for(let y=-r;y<=r;y++){ const w=Math.floor(Math.sqrt(r*r-y*y));\n    ctx.fillRect(Math.round(cx-w),Math.round(cy+y),w*2+1,1); }\n}\nfunction drawBrick(b){\n  if(b.type===\"invis\" && !b.revealed){ // 隐形：像素虚线框\n    ctx.fillStyle=\"rgba(230,192,46,.45)\";\n    for(let x=b.x+3;x<b.x+b.w-2;x+=6){ ctx.fillRect(x,b.y+2,3,2); ctx.fillRect(x,b.y+b.h-4,3,2); }\n    for(let y=b.y+3;y<b.y+b.h-2;y+=6){ ctx.fillRect(b.x+2,y,2,3); ctx.fillRect(b.x+b.w-4,y,2,3); }\n    return;\n  }\n  const col=b.color, dark=shade(col,-40), light=shade(col,55);\n  // 主体 + 像素立体边（左上亮、右下暗）\n  pxRect(b.x,b.y,b.w,b.h,col);\n  pxRect(b.x,b.y,b.w,3,light);            // 顶部高光\n  pxRect(b.x,b.y,3,b.h,light);            // 左侧高光\n  pxRect(b.x,b.y+b.h-3,b.w,3,dark);       // 底部阴影\n  pxRect(b.x+b.w-3,b.y,3,b.h,dark);       // 右侧阴影\n  // 厚砖：受损变暗\n  if(b.type===\"thick\"&&b.hp<b.maxhp){ ctx.fillStyle=\"rgba(0,0,0,.28)\"; ctx.fillRect(b.x+3,b.y+3,b.w-6,b.h-6); }\n  drawBrickIcon(b);\n}\nfunction drawBrickIcon(b){\n  const cx=b.x+b.w/2, cy=b.y+b.h/2, D=\"rgba(0,0,0,.72)\", Wt=\"rgba(255,255,255,.9)\";\n  switch(b.type){\n    case \"func\": // ➕ 十字\n      pxRect(cx-8,cy-2,16,4,Wt); pxRect(cx-2,cy-8,4,16,Wt); break;\n    case \"ball\": // ◔ 圆环\n      pixCircle(cx,cy,7,D); pixCircle(cx,cy,4,b.color); break;\n    case \"heart\": // ❤ 像素心\n      {const s=2.4,H1=[\"01010\",\"11111\",\"11111\",\"01110\",\"00100\"];\n       for(let r=0;r<5;r++)for(let c=0;c<5;c++) if(H1[r][c]===\"1\") pxRect(cx-5*s/2+c*s,cy-5*s/2+r*s,s,s,\"#ffb3c0\");}\n      break;\n    case \"thick\": // ▦ 点阵\n      for(let iy=0;iy<2;iy++)for(let ix=0;ix<3;ix++) pxRect(cx-9+ix*8,cy-5+iy*8,3,3,D); break;\n    case \"tnt\": // 💥 星形炸弹\n      pxRect(cx-2,cy-9,4,18,D); pxRect(cx-9,cy-2,18,4,D);\n      pxRect(cx-6,cy-6,4,4,D); pxRect(cx+2,cy-6,4,4,D); pxRect(cx-6,cy+2,4,4,D); pxRect(cx+2,cy+2,4,4,D); break;\n    case \"coin\": // $ 金币\n      pixCircle(cx,cy,8,\"#ffe58a\"); pixCircle(cx,cy,6,b.color);\n      ctx.fillStyle=D; ctx.font=\"bold 13px 'Courier New'\"; ctx.textAlign=\"center\"; ctx.textBaseline=\"middle\"; ctx.fillText(\"$\",cx,cy+1); break;\n    case \"special\": // ▨ 斜条纹（水缸/太空）\n      ctx.save(); ctx.beginPath(); ctx.rect(b.x+3,b.y+3,b.w-6,b.h-6); ctx.clip();\n      ctx.fillStyle=\"rgba(255,255,255,.55)\";\n      for(let x=b.x-b.h;x<b.x+b.w;x+=8){ ctx.beginPath(); ctx.moveTo(x,b.y+b.h); ctx.lineTo(x+b.h,b.y); ctx.lineTo(x+b.h+3,b.y); ctx.lineTo(x+3,b.y+b.h); ctx.closePath(); ctx.fill(); }\n      ctx.restore(); break;\n  }\n}\nfunction drawItem(it){\n  const map={plus:[\"#d8433a\",\"+\"],heart:[\"#ff4b6e\",\"♥\"],coin:[\"#ffce3a\",\"$\"],shard:[\"#3b6fd4\",\"▨\"]};\n  let [c,ic]=map[it.kind]||[\"#fff\",\"?\"];\n  if(it.kind===\"heart\"&&it.color) c=it.color;   // 对应颜色的血量\n  const s=(Math.sin(gs.t*8+it.x)*1); // 轻微脉动\n  pixCircle(it.x,it.y,10+s, shade(c,-30));\n  pixCircle(it.x,it.y,8+s, c);\n  ctx.fillStyle=\"#111\"; ctx.font=\"bold 13px 'Courier New'\"; ctx.textAlign=\"center\"; ctx.textBaseline=\"middle\";\n  ctx.fillText(ic,it.x,it.y+1); ctx.textBaseline=\"alphabetic\";\n}\nfunction drawPaddle(p,clog){\n  const x=p.x-p.w/2, y=p.y-p.h/2;\n  const base = gs.buffs.laser? \"#ff4b6e\" : clog? \"#8a5a3c\" : \"#eef0f8\";\n  pxRect(x,y,p.w,p.h,base);\n  pxRect(x,y,p.w,3,shade(base,60));        // 顶高光\n  pxRect(x,y+p.h-3,p.w,3,shade(base,-55)); // 底阴影\n  pxRect(x,y,3,p.h,shade(base,30)); pxRect(x+p.w-3,y,3,p.h,shade(base,-40));\n  if(gs.buffs.laser){ pxRect(x+p.w*0.30,y-5,4,5,\"#fff\"); pxRect(x+p.w*0.70-4,y-5,4,5,\"#fff\"); }\n}\nfunction drawBall(ball){\n  const r=Math.round(ball.r);\n  // 残局渐大：脉冲金色光环 + 闪烁描边提示\n  const grow=(!gs.boss)?(gs.ballGrow||1):1;\n  if(grow>1.06){\n    const pulse=0.5+0.5*Math.sin(gs.t*11);\n    const inten=Math.min(1,(grow-1)*1.4);\n    ctx.globalAlpha=(0.25+0.4*pulse)*inten;\n    pixCircle(ball.x,ball.y, r+3+Math.round(pulse*5), \"#ffd23a\");   // 外光晕\n    ctx.globalAlpha=(0.5+0.5*pulse)*inten;\n    pixCircle(ball.x,ball.y, r+2, \"#fff7c2\");                       // 内圈闪烁\n    ctx.globalAlpha=1;\n  }\n  // 空心球：只画环（中空），带脉冲\n  if(ball.type===\"hollow\"){\n    const c=ball.color||\"#5fd0e0\", p=0.5+0.5*Math.sin(gs.t*9);\n    pixCircle(ball.x,ball.y,r+Math.round(p*2),shade(c,40));\n    pixCircle(ball.x,ball.y,r-2,\"#0b0b13\");            // 中空\n    ctx.globalAlpha=0.5; pixCircle(ball.x,ball.y,r+3,c); ctx.globalAlpha=1;\n    pixCircle(ball.x,ball.y,r-2,\"#0b0b13\");\n    return;\n  }\n  // 跟踪球：彩色 + 十字准星\n  if(ball.type===\"tracking\"){\n    const c=ball.color||\"#ff6a4a\";\n    pixCircle(ball.x,ball.y,r,shade(c,-45)); pixCircle(ball.x,ball.y,r-1,c);\n    pxRect(ball.x-1,ball.y-r-3,2,4,\"#fff\"); pxRect(ball.x-1,ball.y+r-1,2,4,\"#fff\");\n    pxRect(ball.x-r-3,ball.y-1,4,2,\"#fff\"); pxRect(ball.x+r-1,ball.y-1,4,2,\"#fff\");\n    return;\n  }\n  let col = (MOD&&MOD.rainbow) ? [\"#ff4b6e\",\"#e6c02e\",\"#3b6fd4\",\"#2f9e44\"][Math.floor(gs.t*8)%4]\n          : gs.buffs.boom?\"#ff9a3c\":(ball.color&&ball.color!==\"#ffffff\"?ball.color:\"#ffffff\");\n  if(grow>1.06) col = (Math.floor(gs.t*12)%2)? \"#fff\":\"#ffe98a\";   // 球体本身也闪烁\n  pixCircle(ball.x,ball.y,r,shade(col,-45));\n  pixCircle(ball.x,ball.y,r-1,col);\n  pxRect(ball.x-r*0.5,ball.y-r*0.6,Math.max(2,r*0.4),Math.max(2,r*0.4),\"#ffffff\"); // 高光块\n}\n/* 像素 Boss 精灵「机敏」——程序化绘制，大而精致 */\nfunction drawBoss(){\n  const b=gs.boss, u=Math.max(4,Math.round(b.w/18));\n  const bob=Math.round(Math.sin(gs.t*3)*u*0.6);\n  const ox=Math.round(b.x), oy=Math.round(b.y)+bob;\n  const P=(gx,gy,gw,gh,col)=>ctx.fillRect(ox+gx*u,oy+gy*u,gw*u,gh*u);\n  const flash=b.flash>0;                                   // 受击闪白\n  const K=\"#1a060a\";\n  const R=flash?\"#ffffff\":\"#d0392b\", R2=flash?\"#e6e6ee\":\"#a02a20\", HI=flash?\"#ffffff\":\"#ff6a5a\", Y=\"#ffce3a\";\n  ctx.fillStyle=K;\n  // 角\n  P(1,-1,2,2); P(15,-1,2,2); P(2,-2,1,1); P(15,-2,1,1);\n  // 轮廓\n  ctx.fillStyle=K; P(2,1,14,11);\n  // 身体\n  ctx.fillStyle=R; P(3,2,12,9);\n  ctx.fillStyle=HI; P(3,2,12,1); P(3,2,1,9);      // 高光边\n  ctx.fillStyle=R2; P(3,10,12,1); P(14,2,1,9);    // 阴影边\n  // 怒眉\n  ctx.fillStyle=K; P(4,4,4,1); P(5,5,3,1); P(10,4,4,1); P(10,5,3,1);\n  // 眼白\n  ctx.fillStyle=\"#fff\"; P(5,5,3,2); P(10,5,3,2);\n  // 瞳孔追踪小球\n  const tb=gs.balls[0]; let dx=0,dy=0;\n  if(tb){ dx=clamp((tb.x-(b.x+b.w/2))/180,-1,1); dy=clamp((tb.y-(b.y+b.h/2))/180,-0.5,1); }\n  ctx.fillStyle=K; P(6+dx,5.5+dy,1,1.5); P(11+dx,5.5+dy,1,1.5);\n  // 嘴 + 尖牙\n  ctx.fillStyle=K; P(5,8,8,2);\n  ctx.fillStyle=\"#fff\"; P(6,8,1,1); P(8,8,1,1); P(10,8,1,1); P(11,8,1,1);\n  // 名字 + 动画像素血条\n  ctx.fillStyle=\"#fff\"; ctx.font=\"bold 13px 'Courier New'\"; ctx.textAlign=\"left\"; ctx.textBaseline=\"alphabetic\";\n  ctx.fillText(\"BOSS · 机敏\", b.x, b.y-16);\n  const bw=b.w, bh=10, by=b.y-13;\n  const jit = b.hurtT>0 ? Math.round(rand(-1,1)) : 0;       // 掉血时血条轻微抖动\n  pxRect(b.x-2,by-2+jit,bw+4,bh+4,\"#000\");                  // 外框\n  pxRect(b.x,by+jit,bw,bh,\"#2a0c10\");                       // 底槽\n  const hpF=Math.max(0,b.hp/b.maxhp);\n  const dispF=Math.max(hpF, (b.dispHp||b.hp)/b.maxhp);\n  pxRect(b.x,by+jit, bw*dispF, bh, \"#ffd23a\");              // 掉血拖尾（黄）\n  pxRect(b.x,by+jit, bw*hpF,  bh, \"#ff3b5c\");               // 当前血（红）\n  pxRect(b.x,by+jit, bw*hpF,  2,  \"#ff9aa8\");               // 顶部高光\n  // 分段刻度\n  ctx.fillStyle=\"rgba(0,0,0,.35)\";\n  for(let i=1;i<10;i++) ctx.fillRect(Math.round(b.x+bw*i/10),by+jit,1,bh);\n}\n// 颜色明暗调整\nfunction shade(hex,amt){\n  if(hex[0]!==\"#\") return hex;\n  let r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),bb=parseInt(hex.substr(5,2),16);\n  r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);bb=clamp(bb+amt,0,255);\n  return `rgb(${r|0},${g|0},${bb|0})`;\n}\nfunction roundRect(x,y,w,h,r){ ctx.beginPath();\n  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);\n  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }\n\n/*========================================================================\n  主循环\n========================================================================*/\nlet last=0;\nfunction loop(ts){\n  requestAnimationFrame(loop);\n  const dt=Math.min(0.033,(ts-last)/1000||0); last=ts;\n  update(dt);\n  render();\n}\nrequestAnimationFrame(loop);\n\n/*========================================================================\n  输入\n========================================================================*/\nfunction toCanvasX(clientX){ const r=cv.getBoundingClientRect(); return (clientX-r.left)/r.width*W; }\ncv.addEventListener(\"mousemove\",e=>{ if(gs&&gs.running) gs.targetX=toCanvasX(e.clientX); });\ncv.addEventListener(\"touchmove\",e=>{ if(gs&&gs.running&&e.touches[0]){ gs.targetX=toCanvasX(e.touches[0].clientX); e.preventDefault(); }},{passive:false});\nfunction launch(){ if(gs&&gs.running&&!gs.paused){ let did=false;\n  for(const b of gs.balls){ if(b.stuck){ b.stuck=false; const a=-Math.PI/2+rand(-0.3,0.3); b.vx=Math.cos(a); b.vy=Math.sin(a); did=true; } }\n  if(did) gs.launched=true; } }\ncv.addEventListener(\"click\",launch);\ncv.addEventListener(\"touchstart\",e=>{ if(gs&&gs.running){ if(e.touches[0]) gs.targetX=toCanvasX(e.touches[0].clientX); launch(); } },{passive:true});\nwindow.addEventListener(\"keydown\",e=>{\n  if(e.code===\"Space\"){ e.preventDefault(); launch(); }\n  if(e.code===\"KeyP\"&&gs&&gs.running&&!gs.over){ togglePause(); }\n});\n\n/*========================================================================\n  界面 / 菜单\n========================================================================*/\nconst SCREENS=[\"menu\",\"diffScreen\",\"cheatScreen\",\"talentScreen\",\"shopScreen\",\"manualScreen\",\"lbScreen\",\"overScreen\"];\nlet screenStack=[];\nfunction showScreen(id){\n  for(const s of SCREENS){ document.getElementById(s).classList.toggle(\"hidden\", s!==id); }\n  document.getElementById(\"pauseScreen\").classList.add(\"hidden\");\n  document.getElementById(\"hudCtl\").style.display = id? \"none\":\"flex\";\n  if(id===\"menu\"){ document.getElementById(\"continueBtn\").style.display=(gs&&gs.running&&!gs.over)?\"\":\"none\"; }\n}\nfunction hideAllScreens(){ for(const s of SCREENS) document.getElementById(s).classList.add(\"hidden\"); }\nfunction toast(msg){ const t=document.getElementById(\"toast\"); t.textContent=msg; t.classList.add(\"show\");\n  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove(\"show\"),1600); }\n\nfunction syncHud(){\n  document.getElementById(\"mHigh\").textContent=SAVE.high;\n  document.getElementById(\"mScore\").textContent=gs?gs.score:0;\n  document.getElementById(\"mCoins\").textContent=SAVE.coins;\n  document.getElementById(\"mTp\").textContent=SAVE.tp;\n}\n\n/* 返回按钮 */\ndocument.querySelectorAll(\"[data-back]\").forEach(x=>x.onclick=()=>{ showScreen(\"menu\"); syncHud(); });\n\n/* 主菜单按钮 */\ndocument.getElementById(\"startBtn\").onclick=()=>openDiff();\ndocument.getElementById(\"talentBtn\").onclick=()=>openTalent();\ndocument.getElementById(\"shopBtn\").onclick=()=>openShop();\ndocument.getElementById(\"manualBtn\").onclick=()=>openManual();\ndocument.getElementById(\"lbBtn\").onclick=()=>openLb();\ndocument.getElementById(\"cheatBtn\").onclick=()=>{ buildCheat(); showScreen(\"cheatScreen\"); };\ndocument.getElementById(\"refreshBtn\").onclick=()=>{ syncHud(); toast(\"已刷新\"); };\n\n/* 难度 */\nconst DIFFS=[\n  {id:\"novice\", nm:\"🐣 新手\", cls:\"green\", d:\"无Boss砖块 · 砖块效果×2 · 血量×3 · 无金币退款 · 不计入积分\"},\n  {id:\"normal\", nm:\"⚔ 普通\",  cls:\"blue\",  d:\"标准玩法，无特殊加成，一切按说明书进行\"},\n  {id:\"veteran\",nm:\"🔥 老手\", cls:\"red\",   d:\"Boss概率+5% · 血量-2 · 金币×1.5 · 分数×1.2\"},\n];\nfunction openDiff(){\n  const box=document.getElementById(\"diffList\"); box.innerHTML=\"\";\n  for(const d of DIFFS){ const el=document.createElement(\"div\"); el.className=\"diffcard\";\n    el.innerHTML=`<h3 style=\"color:var(--${d.cls==='blue'?'blue':d.cls==='red'?'red':'green'})\">${d.nm}</h3><div class=\"d\">${d.d}</div>`;\n    el.onclick=()=>{ startGame(d.id); };\n    box.appendChild(el);\n  }\n  showScreen(\"diffScreen\");\n}\nfunction startGame(diff){\n  hideAllScreens();\n  document.getElementById(\"pauseScreen\").classList.add(\"hidden\");\n  document.getElementById(\"pauseBtn\").textContent=\"⏸\";\n  document.getElementById(\"hudCtl\").style.display=\"flex\";\n  newGame(diff);\n  if(cheatOn()) toast(\"🐞 外挂已开启，本局不计分\");\n}\n\n/* 外挂 */\nfunction buildCheat(){\n  document.querySelectorAll(\"[data-cheat]\").forEach(sw=>{\n    const k=sw.dataset.cheat; sw.classList.toggle(\"on\",CHEAT[k]);\n    sw.onclick=()=>{ CHEAT[k]=!CHEAT[k]; sw.classList.toggle(\"on\",CHEAT[k]); };\n  });\n}\n\n/* 天赋树 */\nfunction openTalent(){ buildTalent(); showScreen(\"talentScreen\"); }\nfunction buildTalent(){\n  document.getElementById(\"tTp\").textContent=SAVE.tp;\n  const grid=document.getElementById(\"talentGrid\"); grid.innerHTML=\"\";\n  // 4行 x 3列 + 根 + 终极\n  const rootT=talById(\"root\");\n  const rootRow=document.createElement(\"div\"); rootRow.className=\"trow\";\n  rootRow.appendChild(mkNode(rootT)); grid.appendChild(rootRow);\n  const tiers=[[\"a1\",\"b1\",\"c1\"],[\"a2\",\"b2\",\"c2\"],[\"a3\",\"b3\",\"c3\"],[\"a4\",\"b4\",\"c4\"]];\n  for(const tier of tiers){ const row=document.createElement(\"div\"); row.className=\"trow\";\n    for(const id of tier) row.appendChild(mkNode(talById(id))); grid.appendChild(row); }\n  const ultRow=document.createElement(\"div\"); ultRow.className=\"trow\"; ultRow.appendChild(mkNode(talById(\"rainbow\")));\n  grid.appendChild(ultRow);\n}\nfunction mkNode(t){\n  const owned=hasTal(t.id), avail=talAvail(t);\n  const el=document.createElement(\"div\");\n  el.className=\"node \"+(owned?\"owned\":avail?\"avail\":\"locked\");\n  el.innerHTML=`<div class=\"nm\">${t.nm}</div><div class=\"cost\">${owned?\"✔已解锁\":(t.cost+\"点\")}</div>`;\n  el.onclick=()=>{ if(owned) return;\n    if(!avail){ toast(SAVE.tp<t.cost?\"天赋点不足\":\"需先解锁前置\"); return; }\n    SAVE.tp-=t.cost; SAVE.talents.push(t.id); save(); buildTalent(); toast(\"已解锁 \"+t.nm); };\n  return el;\n}\ndocument.getElementById(\"talentReset\").onclick=()=>{\n  const refund=SAVE.talents.reduce((s,id)=>s+(talById(id)?.cost||0),0);\n  SAVE.tp+=refund; SAVE.talents=[]; save(); buildTalent(); toast(\"已重置，返还 \"+refund+\" 点\");\n};\n\n/* 商店 */\nfunction openShop(){ buildShop(); showScreen(\"shopScreen\"); }\nfunction buildShop(){\n  document.getElementById(\"sCoins\").textContent=SAVE.coins;\n  const box=document.getElementById(\"shopList\"); box.innerHTML=\"\";\n  for(const it of SHOP){\n    const price=shopPrice(it);\n    const ownedPerm=it.perm&&SAVE.shopPerm[it.id];\n    const activeTemp=SAVE.shopTemp[it.id]>0;\n    const el=document.createElement(\"div\"); el.className=\"shopitem\";\n    el.innerHTML=`<div><div class=\"nm\">${it.nm}</div><div class=\"sub\">${it.sub}</div></div>`;\n    const btn=document.createElement(\"button\"); btn.className=\"btn sm\";\n    if(ownedPerm){ btn.textContent=\"已拥有\"; btn.disabled=true; btn.className=\"btn sm ghost\"; }\n    else { btn.textContent=(it.instant?(\"💰\"+it.price+\"?→\"):\"\") + (price>0?(\"💰\"+price):\"免费\") + (activeTemp?` (${SAVE.shopTemp[it.id]}局)`:\"\"); }\n    btn.onclick=()=>buyItem(it,price);\n    el.appendChild(btn); box.appendChild(el);\n  }\n}\nfunction buyItem(it,price){\n  if(it.perm&&SAVE.shopPerm[it.id]) return;\n  if(it.instant){ // 罪恶置换：立刻得金币，附带本局/3局debuff\n    SAVE.coins+=it.instant; SAVE.shopTemp[it.id]=3; save(); buildShop(); toast(\"😈 +\"+it.instant+\"💰（附带惩罚3局）\"); return;\n  }\n  if(SAVE.coins<price){ toast(\"金币不足\"); return; }\n  SAVE.coins-=price;\n  if(it.perm) SAVE.shopPerm[it.id]=true;\n  else SAVE.shopTemp[it.id]=3;\n  save(); buildShop(); toast(\"✅ 购买成功\");\n}\n\n/* 说明书 */\nfunction openManual(){ buildManual(); showScreen(\"manualScreen\"); }\nfunction buildManual(){\n  const box=document.getElementById(\"manualBody\");\n  box.innerHTML=`\n   <div class=\"card\"><h3>🎮 基础规则</h3>\n    <ul><li>移动鼠标控制底部平台接住小球，点击/空格发射。</li>\n    <li>开局3颗心，掉球扣心，心归零则失败。</li>\n    <li>每波砖块全部清除进入下一波；左右上边界反弹，底部漏球。</li>\n    <li>分数达 <b style=\"color:#ff5c72\">10000</b> 强制触发 Boss 战【机敏】（唯一触发方式）。</li></ul></div>\n   <div class=\"card\"><h3>🧱 砖块类型与爆率</h3><ul>\n    <li>普通 70% +50｜功能➕ 击碎掉落随机Buff +150</li>\n    <li>血量❤ 接4次红心回1血 +150｜小球◔ 解锁多球 +100</li>\n    <li>厚砖▦ 需2击 +80｜隐形⬚ 击中现形再破 +200</li>\n    <li>TNT💥 爆炸 +100｜金币$ 掉金币 +50~150</li>\n    <li>水缸/太空▨ 掉“碎片”，误接→平台堵塞50%持续3秒</li></ul></div>\n   <div class=\"card\"><h3>✨ 功能砖块Buff（随机）</h3><ul>\n    <li>加速×2 25s｜平台变长 20s｜精准 15s｜缓降 20s</li>\n    <li>额外小平台(单次)｜小球变大+攻 10s｜激光平台 15s</li>\n    <li>爆炸球 20s｜金币球(本局永久) 每击+2金币</li></ul></div>\n   <div class=\"card\"><h3>👹 Boss战·机敏</h3><ul>\n    <li>体积×10，血量与分数挂钩；小球基础伤害50。</li>\n    <li>累计1000伤害小球-10%，碰平台恢复8%（战后复原）。</li>\n    <li>击杀奖励：+1天赋点 +500分 +500金币。</li></ul></div>\n   <div class=\"card\"><h3>🍀 隐藏幸运</h3><ul>\n    <li>连续3局未破纪录（非酋奖）：下局砖块爆率提升。</li></ul></div>`;\n}\n\n/* 排行榜 */\nfunction openLb(){ buildLb(); showScreen(\"lbScreen\"); }\nfunction buildLb(){\n  const box=document.getElementById(\"lbList\"); box.innerHTML=\"\";\n  if(SAVE.board.length===0){ box.innerHTML='<div class=\"hint\">还没有记录，快去挑战吧！</div>'; return; }\n  SAVE.board.forEach((e,i)=>{ const el=document.createElement(\"div\"); el.className=\"lbrow\";\n    const medal=[\"🥇\",\"🥈\",\"🥉\",\"4\",\"5\"][i]||(i+1);\n    el.innerHTML=`<span class=\"rk\">${medal}</span><span class=\"nm\">${e.name}</span><span class=\"sc\">${e.score}</span>`;\n    box.appendChild(el); });\n}\ndocument.getElementById(\"lbClear\").onclick=()=>{ if(confirm(\"确定清空排行榜？\")){ SAVE.board=[]; save(); buildLb(); } };\n\n/* 结算按钮 */\ndocument.getElementById(\"saveScore\").onclick=saveScoreToBoard;\ndocument.getElementById(\"againBtn\").onclick=()=>startGame(diffName||\"normal\");\ndocument.getElementById(\"homeBtn\").onclick=()=>{ showScreen(\"menu\"); syncHud(); };\n\n/* 游戏内控制 & 暂停/继续 */\nfunction setPause(p){ if(!gs) return; gs.paused=p;\n  document.getElementById(\"pauseBtn\").textContent=p?\"▶\":\"⏸\";\n  document.getElementById(\"pauseScreen\").classList.toggle(\"hidden\",!p); }\nfunction togglePause(){ if(!gs||!gs.running||gs.over) return; setPause(!gs.paused); }\nfunction continueGame(){                       // 从主菜单回到本局\n  if(!gs||!gs.running||gs.over){ openDiff(); return; }\n  hideAllScreens(); document.getElementById(\"pauseScreen\").classList.add(\"hidden\");\n  document.getElementById(\"hudCtl\").style.display=\"flex\"; setPause(false);\n}\nfunction pauseToMenu(){ if(gs&&gs.running&&!gs.over) gs.paused=true; showScreen(\"menu\"); syncHud(); }\ndocument.getElementById(\"pauseBtn\").onclick=togglePause;\ndocument.getElementById(\"continueBtn\").onclick=continueGame;\ndocument.getElementById(\"resumeBtn\").onclick=()=>setPause(false);\ndocument.getElementById(\"restartBtn\").onclick=()=>{ document.getElementById(\"pauseScreen\").classList.add(\"hidden\"); startGame(diffName||\"normal\"); };\ndocument.getElementById(\"pauseHomeBtn\").onclick=pauseToMenu;\ndocument.getElementById(\"muteBtn\").onclick=()=>{ gs.muted=!gs.muted; document.getElementById(\"muteBtn\").textContent=gs.muted?\"🔇\":\"🔊\"; };\ndocument.getElementById(\"quitBtn\").onclick=pauseToMenu;   // 退出改为非破坏性：保留本局可继续\n\n/* 启动：显示主菜单 */\nshowScreen(\"menu\"); syncHud();\n\n/* 暴露给无头测试 */\nif(typeof window!==\"undefined\"){ window.__bb={get gs(){return gs;}, newGame, update, render, SAVE, computeMod, get MOD(){return MOD;}, CHEAT, triggerBoss, buildWave, __break:breakBrick}; }\n<\/script>\n</body>\n</html>\n" },
};

// 生成预览小图（纯 CSS 元素）
const clayCols=["#8a5a3c","#f2f0ea","#f2c94c","#5fbf6a","#4d7ee0","#f48fb1","#a45ce0","#e0464b"];
const cp=document.getElementById("clayPrev");
clayCols.forEach(c=>{ const d=document.createElement("div"); d.className="blob";
  d.style.background=c; d.style.height=(30+Math.random()*30)+"%"; cp.appendChild(d); });
const brickCols=["#3b6fd4","#d8433a","#e6c02e","#2f9e44"];
const bp=document.getElementById("brickPrev");
brickCols.forEach(c=>{ const row=document.createElement("div"); row.className="brow";
  for(let i=0;i<7;i++){ const b=document.createElement("div"); b.className="brk"; b.style.background=c;
    if(Math.random()<0.12) b.style.visibility="hidden"; row.appendChild(b);} bp.insertBefore(row,bp.firstChild); });

const player=document.getElementById("player");
const frame=document.getElementById("frame");
const pname=document.getElementById("pname");

function openGame(key){
  const g=GAMES[key]; if(!g) return;
  pname.textContent=g.name;
  frame.srcdoc=g.html;          // 用 srcdoc 隔离，两款游戏互不干扰
  player.hidden=false;
  document.body.style.overflow="hidden";
  setTimeout(()=>frame.focus(),60);
}
function closeGame(){
  player.hidden=true;
  frame.srcdoc="";              // 卸载游戏，停止运行
  document.body.style.overflow="";
}
document.querySelectorAll(".cab").forEach(el=>{
  el.addEventListener("click",()=>openGame(el.dataset.game));
  el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openGame(el.dataset.game);} });
});
document.getElementById("backBtn").addEventListener("click",closeGame);
window.addEventListener("keydown",e=>{ if(e.key==="Escape"&&!player.hidden) closeGame(); });
</script>
